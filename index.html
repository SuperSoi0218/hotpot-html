<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>🔥 火锅店 · 经营模拟</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-touch-callout:none}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Courier New',monospace;overflow:hidden;touch-action:manipulation}
#container{position:relative;width:420px;height:700px;background:#3a2010;border:4px solid #5c3a1e;border-radius:8px;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.5)}
canvas{display:block;width:100%;height:100%;touch-action:none}
#tooltip{position:absolute;bottom:10px;left:10px;right:10px;background:rgba(0,0,0,.85);color:#ffcc00;padding:8px 12px;border-radius:4px;font-size:13px;text-align:center;pointer-events:none;transition:opacity .3s}
@media(max-width:440px){#container{width:100vw;height:100vh;border:none;border-radius:0}}
</style>
</head>
<body>
<div id="container">
  <canvas id="c" width="420" height="700"></canvas>
  <div id="tooltip">🔥 欢迎来到老火锅！顾客马上就到，跟着指引操作吧</div>
</div>
<script>
// ============================================================
//  CONFIG
// ============================================================
const PU=4,W=420,H=700;
const MAP={WIDTH:700,STREET_END:180,DOOR_X:150,DOOR_Y:200,DOOR_W:28,DOOR_H:140};
const CAM={x:0,maxX:MAP.WIDTH-W};

// Tables (world coords: center x, seat y)
const TABLES=[
  {id:1,cx:260,y:260,w:80,h:60,state:'clean',cust:null},
  {id:2,cx:380,y:260,w:80,h:60,state:'clean',cust:null},
  {id:3,cx:500,y:240,w:80,h:60,state:'clean',cust:null},
  {id:4,cx:280,y:400,w:80,h:60,state:'clean',cust:null},
  {id:5,cx:440,y:400,w:80,h:60,state:'clean',cust:null},
];
const STOVES=[
  {id:1,x:440,y:500,w:68,h:56,busy:false,progress:0,maxProgress:5,orderId:null},
  {id:2,x:530,y:500,w:68,h:56,busy:false,progress:0,maxProgress:5,orderId:null},
  {id:3,x:620,y:500,w:68,h:56,busy:false,progress:0,maxProgress:5,orderId:null},
];

// ============================================================
//  PALETTE
// ============================================================
const C={
  RED:'#cc3333',DRED:'#881111',ORANGE:'#ff6633',YELLOW:'#ffcc00',
  GOLD:'#daa520',BROWN:'#8b4513',DBRN:'#5c2e00',
  GREEN:'#339933',DGREEN:'#226622',
  WHITE:'#fff',CREAM:'#fff8e7',LGRAY:'#ddd',GRAY:'#888',DGRAY:'#444',BLACK:'#222',
  BLUE:'#3366cc',
  SKIN:'#ffcc99',SKIN2:'#eebb88',SKIN3:'#ddaa77',
  PINK:'#ff99aa',
  BRICK:'#aa5533',DBRICK:'#884422',ROOF:'#664422',
  SWALK:'#bbbbaa',ROAD:'#555',ROADLINE:'#ffdd55',
  WALL:'#ffe8cc',DWALL:'#ddbb99',
  FLOOR:'#ccbb99',DFLOOR:'#bbaa88',WOOD:'#996644',
};
const _=0; // transparent sentinel

// ============================================================
//  RENDERER
// ============================================================
const ctx=document.getElementById('c').getContext('2d');
const r=(x,y,w,h,c)=>{ctx.fillStyle=c;ctx.fillRect(x,y,w,h)};
const pr=(x,y,w,h,c)=>{c?ctx.fillStyle=c:0;const p=PU;ctx.fillRect(Math.floor(x/p)*p,Math.floor(y/p)*p,Math.floor(w/p)*p,Math.floor(h/p)*p)};
const b=(x,y,w,h,bc,fc,s)=>{s=s||PU;pr(x,y,w,s,bc);pr(x,y+h-s,w,s,bc);pr(x,y,s,h,bc);pr(x+w-s,y,s,h,bc);if(fc)pr(x+s,y+s,w-s*2,h-s*2,fc)};
const txt=(t,x,y,c,sz)=>{ctx.fillStyle=c||C.WHITE;ctx.font=`bold ${sz||12}px 'Courier New',monospace`;ctx.textAlign='left';ctx.fillText(t,x|0,y|0)};

// Sprite drawer
const dr=(data,x,y,scale)=>{
  const s=(scale||1)*PU;
  for(let r2=0;r2<data.length;r2++)
    for(let c2=0;c2<data[r2].length;c2++){
      const col=data[r2][c2];
      if(col)ctx.fillRect((x+c2*s)|0,(y+r2*s)|0,(s+0.5)|0,(s+0.5)|0);
    }
};

// ============================================================
//  CHARACTER BUILDER
// ============================================================
// 8 wide x 12 tall pixel character
// _=transparent, H=hair, S=skin, E=eye, R=cheek, T=shirt, A=arm, P=pants, F=feet

function makeChar(hair,skin,shirt,pants,shoes,eyeColor){
  const H=hair,S=skin,T=shirt,P=pants,F=shoes,E=eyeColor||C.BLACK;
  // Build base figure (standing)
  const base=[];
  base[0]=[_,_,H,H,H,H,_,_];      // 0 hair top
  base[1]=[_,H,H,H,H,H,H,_];       // 1 hair
  base[2]=[_,H,S,S,S,S,H,_];       // 2 hair+face
  base[3]=[_,S,S,E,E,S,S,_];       // 3 eyes
  base[4]=[_,S,S,_,_,S,S,_];       // 4 nose area
  base[5]=[_,S,S,S,S,S,S,_];       // 5 face bottom
  base[6]=[_,T,T,T,T,T,T,_];       // 6 shirt
  base[7]=[_,_,T,T,T,T,_,_];       // 7 shirt waist
  base[8]=[_,_,P,P,P,P,_,_];       // 8 pants top
  base[9]=[_,P,_,_,_,P,_,_];       // 9 left leg, right leg
  base[10]=[_,P,_,_,_,P,_,_];      // 10 legs
  base[11]=[_,_,F,F,F,F,_,_];      // 11 feet

  // Walking frame: legs apart
  const walk=[];
  for(let i=0;i<6;i++)walk[i]=[...base[i]]; // copy upper body
  walk[6]=[_,T,T,T,T,T,T,_];
  walk[7]=[_,_,T,T,T,T,_,_];
  walk[8]=[_,_,P,P,P,P,_,_];
  walk[9]=[P,P,_,_,_,_,P,_];       // legs spread wide
  walk[10]=[_,P,_,_,_,P,_,_];       // cross over
  walk[11]=[_,_,_,F,F,_,_,_];       // feet close

  return [base,walk];
}

// Character variants: [hair, skin, shirt, pants, shoes, eyes]
const CHAR_VARIANTS=[
  [C.BLACK,C.SKIN,C.RED,C.DGRAY,C.BLACK,C.BLACK],
  [C.BROWN,C.SKIN2,C.BLUE,C.DGRAY,C.BLACK,C.BLACK],
  [C.GOLD,C.SKIN3,C.GREEN,C.BROWN,C.BLACK,C.BLACK],
  [C.DGRAY,C.SKIN,C.ORANGE,C.DGRAY,C.BLACK,C.BLACK],
  [C.DRED,C.SKIN2,C.PURPLE,C.BROWN,C.BLACK,C.BLACK],
  [C.BLACK,C.SKIN,C.TEAL,C.DGRAY,C.BLACK,C.BLACK],
  [C.BROWN,C.SKIN3,C.PINK,C.BROWN,C.BLACK,C.BLACK],
  [C.GOLD,C.SKIN2,C.GRAY,C.DGRAY,C.BLACK,C.BLACK],
];

// Build sprites
const CHAR_SPRITES={};
CHAR_VARIANTS.forEach((v,i)=>{
  const f=makeChar(...v);
  CHAR_SPRITES['c'+i]=f;
});
// Pedestrian (duller)
const PED=makeChar(C.DGRAY,C.SKIN2,C.GRAY,C.DGRAY,C.BLACK,C.BLACK);
CHAR_SPRITES.ped=PED;

// ============================================================
//  SPRITE DATA
// ============================================================
const S_HOTPOT=[
  [0,0,C.GRAY,C.GRAY,C.GRAY,C.GRAY,0,0],
  [0,C.GRAY,C.DRED,C.RED,C.RED,C.DRED,C.GRAY,0],
  [0,C.GRAY,C.RED,C.ORANGE,C.ORANGE,C.RED,C.GRAY,0],
  [0,C.GRAY,C.RED,C.YELLOW,C.YELLOW,C.RED,C.GRAY,0],
  [0,C.GRAY,C.RED,C.ORANGE,C.ORANGE,C.RED,C.GRAY,0],
  [0,C.GRAY,C.DRED,C.RED,C.RED,C.DRED,C.GRAY,0],
  [0,C.BROWN,C.BROWN,C.DBRN,C.DBRN,C.BROWN,C.BROWN,0],
  [0,0,C.GRAY,C.GRAY,C.GRAY,C.GRAY,0,0],
];

const S_PLATE=[
  [0,0,C.WHITE,C.WHITE,0,0],
  [0,C.WHITE,C.LGRAY,C.LGRAY,C.WHITE,0],
  [C.WHITE,C.LGRAY,C.RED,C.RED,C.LGRAY,C.WHITE],
  [C.WHITE,C.LGRAY,C.GREEN,C.GREEN,C.LGRAY,C.WHITE],
  [0,C.WHITE,C.LGRAY,C.LGRAY,C.WHITE,0],
  [0,0,C.WHITE,C.WHITE,0,0],
];

const S_COIN=[
  [0,C.GOLD,C.GOLD,C.GOLD,C.GOLD,0],
  [C.GOLD,C.YELLOW,C.YELLOW,C.YELLOW,C.YELLOW,C.GOLD],
  [C.GOLD,C.YELLOW,C.WHITE,C.WHITE,C.YELLOW,C.GOLD],
  [C.GOLD,C.YELLOW,C.WHITE,C.WHITE,C.YELLOW,C.GOLD],
  [C.GOLD,C.YELLOW,C.YELLOW,C.YELLOW,C.YELLOW,C.GOLD],
  [0,C.GOLD,C.GOLD,C.GOLD,C.GOLD,0],
];

// ============================================================
//  GAME STATE
// ============================================================
const G={gold:300,diamond:10,level:1,exp:0,served:0,earned:0,gameTime:0,dayPhase:0};
let entities=[],orderQueue=[],orderId=0;

// ============================================================
//  ENTITY SYSTEM
// ============================================================
const ENT={
  create(type,x,y,cfg){
    const e=Object.assign({
      type,x,y,targetX:x,targetY:y,
      waypoints:[],wpIdx:0,speed:55+Math.random()*20,
      dir:1,frame:0,frameT:0,variant:0,
      state:'idle',tableId:null,
      order:null,eatP:0,satisfaction:100,patience:35,_bob:0,
    },cfg||{});
    return e;
  },
  update(e,dt){
    switch(e.state){
      case 'idle':break;
      case 'spawn':e.state='walking';break;
      case 'walking':
      case 'walking_out':
        this._moveTo(e,dt,e.targetX,e.targetY);
        break;
      case 'seated':
        if(!e.order){
          // Player must click to order (handled in input)
        }
        break;
      case 'eating':
        e.eatP+=dt/6; // 6 seconds to eat
        if(e.eatP>=1){
          e.state='done';
          setTip('💰 顾客吃完了！点击结账');
        }
        break;
      case 'done':
        // Waiting for player to click checkout
        break;
      case 'flying':
        e._age=(e._age||0)+dt;
        if(e._age>=e.lifespan)e.state='left';
        break;
      case 'left':break;
    }
  },
  _moveTo(e,dt,tx,ty){
    const dx=tx-e.x,dy=ty-e.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<3){
      e.wpIdx++;
      if(e.wpIdx>=e.waypoints.length){
        if(e.type==='customer'&&e.state==='walking'){
          e.state='seated';
          e.x=e.targetX;e.y=e.targetY;
          setTip(`👤 顾客已入座！点击顾客点单`);
        }else if(e.type==='customer'&&e.state==='walking_out'){
          e.state='left';
          const tbl=TABLES.find(t=>t.id===e.tableId);
          if(tbl){tbl.state='dirty';tbl.cust=null;}
        }else if(e.type==='pedestrian'){
          e.state='left';
        }
      }else{
        e.targetX=e.waypoints[e.wpIdx].x;
        e.targetY=e.waypoints[e.wpIdx].y;
        e.dir=e.targetX>e.x?1:-1;
      }
    }else{
      const step=e.speed*dt;
      e.x+=dx/dist*step;
      e.y+=dy/dist*step;
      e.dir=dx>0?1:-1;
      e.frameT+=dt;
      if(e.frameT>0.2){e.frame=1-e.frame;e.frameT=0;}
      e._bob=Math.sin(G.gameTime*12+(e.id||0))*1.8;
    }
  },
};

// ============================================================
//  CUSTOMER SYSTEM
// ============================================================
function spawnCustomer(){
  const free=TABLES.find(t=>t.state==='clean');
  if(!free)return;
  const e=ENT.create('customer',-20,MAP.DOOR_Y+MAP.DOOR_H-24,{
    state:'spawn',tableId:free.id,speed:50+Math.random()*20,
    patience:30+Math.random()*10,satisfaction:100,variant:Math.floor(Math.random()*8),
  });
  const tcx=free.cx;
  const ty=free.y;
  e.waypoints=[
    {x:MAP.DOOR_X+MAP.DOOR_W/2,y:MAP.DOOR_Y+MAP.DOOR_H-24},  // ① walk to door
    {x:tcx,y:ty},                                               // ② walk to table
  ];
  e.wpIdx=0;e.targetX=e.waypoints[0].x;e.targetY=e.waypoints[0].y;
  e.dir=1;
  free.state='occupied';free.cust=e;
  entities.push(e);
  setTip('👤 有顾客来了！看他走进店里');
}

function spawnPedestrian(){
  const fromL=Math.random()>0.5;
  const sx=fromL?-10:MAP.STREET_END+10;
  const e=ENT.create('pedestrian',sx,MAP.DOOR_Y+MAP.DOOR_H+20,{
    targetX:fromL?MAP.STREET_END+10:-10,
    targetY:MAP.DOOR_Y+MAP.DOOR_H+20,
    speed:40+Math.random()*30,state:'walking',variant:Math.floor(Math.random()*4),
  });
  e.dir=fromL?1:-1;e.waypoints=[{x:e.targetX,y:e.targetY}];e.wpIdx=0;
  entities.push(e);
}

// ============================================================
//  COOKING SYSTEM
// ============================================================
function startCooking(stove){
  if(stove.busy||orderQueue.length===0)return;
  const order=orderQueue.find(o=>!o.assigned);
  if(!order){setTip('⏳ 没有待烹饪的订单');return;}
  order.assigned=true;order.stoveId=stove.id;
  stove.busy=true;stove.progress=0;
  stove.maxProgress=4+Math.random()*2;
  stove.orderId=order.id;
  setTip(`🍳 开始烹饪 ${order.dishName||'菜品'}！`);
}

function serveFood(stove){
  if(!stove.busy)return;
  const pct=stove.progress/stove.maxProgress;
  if(pct<0.6){setTip('⏳ 还没熟，再等等');return;}
  if(pct>1.15){setTip('💀 烧糊了...');stove.busy=false;stove.progress=0;stove.orderId=null;return;}
  // Find the customer
  const order=orderQueue.find(o=>o.id===stove.orderId);
  if(!order){stove.busy=false;return;}
  const cust=entities.find(e=>e.id===order.custId);
  if(!cust||cust.state!=='seated'){stove.busy=false;return;}
  // Serve!
  const bonus=pct>=0.85?1.5:1.0;
  cust.state='eating';cust.eatP=0;cust._bonus=bonus;
  stove.busy=false;stove.progress=0;stove.orderId=null;
  orderQueue=orderQueue.filter(o=>o.id!==order.id);
  setTip(`🍲 上菜完成！${bonus>1?'✨完美烹饪！':''}`);
  // Visual: spawn a floating food item
  const fx=ENT.create('food_fx',stove.x+34,stove.y-20,{
    targetX:cust.x,targetY:cust.y-10,
    state:'flying',speed:120,lifespan:0.5,_age:0,
  });
  entities.push(fx);
}

// ============================================================
//  INPUT
// ============================================================
let isDrag=false,dxS=0,camS=0;

function getWorldPos(e){
  const r=canvas.getBoundingClientRect();
  return {x:(e.clientX-r.left)*W/r.width,y:(e.clientY-r.top)*H/r.height};
}

function handleClick(mx,my){
  const wxCAM={x:mx+CAM.x,y:my};

  // 1. Check stove clicks
  STOVES.forEach(st=>{
    const sx=st.x-CAM.x;
    if(mx>=sx&&mx<=sx+st.w&&my>=st.y&&my<=st.y+st.h){
      if(st.busy)serveFood(st);
      else startCooking(st);
      return;
    }
  });

  // 2. Check seated customer clicks (to order or checkout)
  entities.forEach(e=>{
    if(e.type!=='customer')return;
    const ex=e.x-CAM.x;
    const charH=12*PU;
    // Seated character drawn at e.y-charH+8 (upper body rows 0-6, ~28px)
    // Hit zone: 40px wide, centered on seated body area
    const seatCx=e.y-charH+24; // center of seated upper body
    if(Math.abs(mx-ex)<24&&Math.abs(my-seatCx)<28){
      if(e.state==='seated'&&!e.order){
        openOrderMenu(e);
      }else if(e.state==='done'){
        checkoutCustomer(e);
      }
    }
  });

  // 3. Check order menu button clicks
  if(menuState.active){
    const oy=300,iH=28;
    menuState.items.forEach((item,i)=>{
      const iy=oy+i*(iH+4);
      if(mx>=80&&mx<=340&&my>=iy&&my<=iy+iH){
        placeOrder(menuState.customer,item);
        closeOrderMenu();
      }
    });
    // Close button
    if(mx>=300&&mx<=340&&my>=250&&my<=270)closeOrderMenu();
  }
}

// ============================================================
//  ORDER MENU
// ============================================================
const MENU_ITEMS=[
  {id:1,name:'🥩 肥牛卷',price:68,cookTime:4},
  {id:2,name:'🦐 虾滑',price:88,cookTime:5},
  {id:3,name:'🥬 蔬菜拼盘',price:48,cookTime:3},
  {id:4,name:'🍄 菌菇拼盘',price:58,cookTime:4},
  {id:5,name:'🍜 手工面条',price:38,cookTime:3},
  {id:6,name:'🧆 手工肉丸',price:78,cookTime:5},
];

let menuState={active:false,customer:null,items:MENU_ITEMS};

function openOrderMenu(cust){
  menuState.active=true;menuState.customer=cust;
}

function closeOrderMenu(){menuState.active=false;menuState.customer=null;}

function placeOrder(cust,item){
  if(!cust||!item)return;
  const o={id:++orderId,custId:cust.id,dishId:item.id,dishName:item.name,
           price:item.price,cookTime:item.cookTime,assigned:false,stoveId:null};
  orderQueue.push(o);
  cust.order=o;
  setTip(`📋 ${item.name} 已下单！点击灶台开始烹饪`);
}

function checkoutCustomer(cust){
  if(cust.state!=='done')return;
  const basePrice=cust.order?MENU_ITEMS.find(m=>m.id===cust.order.dishId)?.price||50:50;
  const bonus=cust._bonus||1;
  const satisfactionBonus=1+(cust.satisfaction-50)/100;
  const income=Math.floor(basePrice*bonus*satisfactionBonus);
  G.gold+=income;G.earned+=income;G.served++;G.exp+=Math.floor(income*0.1);
  checkLevelUp();
  // Customer leaves
  cust.state='walking_out';
  cust.waypoints=[
    {x:MAP.DOOR_X+MAP.DOOR_W/2,y:MAP.DOOR_Y+MAP.DOOR_H-24},
    {x:-30,y:MAP.DOOR_Y+MAP.DOOR_H-24},
  ];
  cust.wpIdx=0;cust.targetX=cust.waypoints[0].x;cust.targetY=cust.waypoints[0].y;
  cust.dir=-1;
  setTip(`💰 结账 +${income}金币！${bonus>1?'✨完美烹饪加成！':''}`);
}

// ============================================================
//  LEVELING
// ============================================================
const LVL_REQ=[0,100,150,220,320,450,600,800,1050,1350,1700];
function getExpNeed(lv){return LVL_REQ[lv]||100+lv*80}
function checkLevelUp(){
  const need=getExpNeed(G.level);
  if(G.exp>=need&&G.level<20){G.exp-=need;G.level++;G.diamond+=Math.floor(G.level/2);setTip(`🎉 Lv.${G.level}!`)}
}

// ============================================================
//  GAME UPDATE
// ============================================================
let spawnT=0,pedT=0;

function update(dt){
  G.gameTime+=dt;G.dayPhase+=dt;

  // Spawn customers
  spawnT+=dt;
  const active=entities.filter(e=>e.type==='customer'&&e.state!=='left').length;
  if(spawnT>3.5&&active<6&&TABLES.some(t=>t.state==='clean')){
    spawnT=0;spawnCustomer();
  }

  // Pedestrians
  pedT+=dt;
  if(pedT>4&&entities.filter(e=>e.type==='pedestrian'&&e.state!=='left').length<2){
    pedT=0;spawnPedestrian();
  }

  // Update entities
  entities.forEach(e=>ENT.update(e,dt));

  // Clean up
  entities=entities.filter(e=>e.state!=='left');

  // Stoves
  STOVES.forEach(st=>{if(st.busy)st.progress+=dt;});

  // Table auto-clean (3s delay)
  TABLES.forEach(t=>{
    if(t.state==='dirty'&&!t._cleanT)t._cleanT=0;
    if(t.state==='dirty'){t._cleanT+=dt;if(t._cleanT>3){t.state='clean';t._cleanT=0;}}
  });

  // Clean completed orders (served orders removed by serveFood)
}

// ============================================================
//  RENDER
// ============================================================
function draw(){
  const cx=CAM.x;

  // Background
  r(0,0,W,H,'#2a1a08');

  // --- Street ---
  if(cx<MAP.STREET_END+50)drawStreet(cx);

  // --- Interior ---
  if(cx+W>MAP.STREET_END)drawInterior(cx);

  // --- Entities ---
  drawAllEntities(cx);

  // --- HUD ---
  drawHUD(cx);

  // --- Order menu overlay ---
  if(menuState.active)drawOrderMenu();
}

function drawStreet(cx){
  const sx=-cx;
  const cl=Math.max(0,sx),cr=Math.min(W,sx+MAP.STREET_END);

  // Building wall
  r(cl,0,cr-cl,220,C.BRICK);
  // Brick lines
  for(let by=0;by<220;by+=14)
    for(let bx=0;bx<MAP.STREET_END;bx+=14){
      const ox=bx+sx;
      if(ox>-14&&ox<W){
        const off=(by/14%2===0?0:7);
        pr(ox+((bx+off)%14),by+6,4,4,C.DBRICK);
      }
    }

  // Windows
  for(let wx=20;wx<MAP.STREET_END-20;wx+=60){
    const ox=wx+sx;
    if(ox>-50&&ox<W+10){
      b(ox,40,36,44,C.DBRN,C.YELLOW,2);
      pr(ox+17,42,2,40,'rgba(0,0,0,.3)');
      pr(ox+2,61,32,2,'rgba(0,0,0,.3)');
    }
  }

  // Awning
  r(cl,218,cr-cl,18,C.RED);
  for(let ax=0;ax<MAP.STREET_END;ax+=10)pr(ax+sx,218,2,18,C.DRED);

  // Sign
  b(30+sx,224,120,28,C.GOLD,C.DBRN);
  txt('老 火 锅',58+sx,243,C.YELLOW,16);

  // Door
  const dx=MAP.DOOR_X+sx,dy=MAP.DOOR_Y;
  b(dx-2,dy-2,MAP.DOOR_W+4,MAP.DOOR_H+4,C.DBRN,0,3);
  r(dx,dy,MAP.DOOR_W,MAP.DOOR_H,'#151515');
  // Door curtain / beads
  for(let b2=0;b2<MAP.DOOR_W;b2+=6)pr(dx+b2,dy+10,2,MAP.DOOR_H-20,C.DRED);
  pr(dx-2,dy+MAP.DOOR_H-4,MAP.DOOR_W+4,6,C.BROWN);

  // Sidewalk
  const swY=MAP.DOOR_Y+MAP.DOOR_H;
  r(cl,swY,cr-cl,24,C.SWALK);
  for(let l2=0;l2<MAP.STREET_END;l2+=16)pr(l2+sx,swY+8,1,8,C.LGRAY);

  // Road
  const rdY=swY+24;
  r(cl,rdY,cr-cl,50,C.ROAD);
  for(let rl=0;rl<MAP.STREET_END;rl+=20)pr(rl+sx,rdY+22,10,3,C.ROADLINE);

  // Moving car
  const carOff=Math.floor(G.gameTime*40)%(MAP.STREET_END+80)-40;
  if(carOff>-50&&carOff<MAP.STREET_END){
    const cx2=carOff+sx;
    r(cx2,rdY+4,44,20,C.BLUE);
    r(cx2+6,rdY-4,36,14,C.BLUE);
    pr(cx2+8,rdY-8,8,8,C.LGRAY);
    pr(cx2+30,rdY-8,8,8,C.LGRAY);
    r(cx2+6,rdY+18,8,6,C.BLACK);
    r(cx2+30,rdY+18,8,6,C.BLACK);
    r(cx2+40,rdY+4,4,8,C.YELLOW);
    pr(cx2+14,rdY-2,6,4,C.LGRAY);
    pr(cx2+26,rdY-2,6,4,C.LGRAY);
  }
}

function drawInterior(cx){
  const start=Math.max(0,MAP.STREET_END-cx);
  const end=Math.min(W,MAP.WIDTH-cx);

  // Back wall
  r(start,0,end-start,35,C.DWALL);
  // Wood trim
  r(start,35,end-start,8,C.WOOD);

  // Wall decor
  for(let wx=200;wx<MAP.WIDTH;wx+=100){
    const ox=wx-cx;
    if(ox>-40&&ox<W){
      pr(ox+4,6,12,12,C.GOLD);
      r(ox+20,6,12,12,C.DRED);
    }
  }

  // Floor
  r(start,43,end-start,475,C.FLOOR);
  // Floor tiles
  for(let fy=48;fy<510;fy+=30){
    const off=(Math.floor((fy-48)/30)%2===0?0:15);
    for(let fx=MAP.STREET_END+off;fx<MAP.WIDTH;fx+=30){
      const ox=fx-cx;
      if(ox>-30&&ox<W)r(ox,fy,28,28,C.DFLOOR);
    }
  }

  // Kitchen counter
  r(start,490,end-start,8,C.WOOD);
  // Kitchen label
  if(start<W-40)txt('🍳 厨房  ← 拖动查看',40,510,C.DGRAY,12);

  // Tables
  TABLES.forEach(t=>{
    const tx=t.cx-t.w/2-cx,ty=t.y;
    if(tx>-90&&tx<W+10){
      // Shadow
      r(tx+2,ty+2,t.w,t.h,'rgba(0,0,0,.12)');
      // Table surface
      const tc=t.state==='dirty'?'#a08060':t.state==='occupied'?'#e8d8c8':C.CREAM;
      b(tx,ty,t.w,t.h,C.WOOD,tc,3);
      // Hotpot
      const hpX=tx+t.w/2-16,hpY=ty+4;
      dr(S_HOTPOT,hpX,hpY,0.9);
      // Steam (subtle)
      if(t.state==='occupied'){
        const sy=ty-2-(G.gameTime*2%10);
        ctx.globalAlpha=0.15;
        pr(tx+t.w/2-4,sy,8,4,C.WHITE);
        ctx.globalAlpha=1;
      }
      // Dirty indicator
      if(t.state==='dirty'){
        txt('💩',tx+t.w/2-8,ty+t.h-16,C.WHITE,12);
      }
    }
  });

  // Stoves
  STOVES.forEach(st=>{
    const sx2=st.x-cx, sy=st.y;
    if(sx2>-80&&sx2<W+10){
      // Stove body
      pr(sx2,sy,st.w,st.h,C.DGRAY);
      pr(sx2+4,sy+4,st.w-8,st.h-8,C.BLACK);
      // Burner rings
      pr(sx2+12,sy-4,st.w-24,6,C.GRAY);
      pr(sx2+16,sy-8,st.w-32,6,C.DGRAY);

      if(st.busy){
        // Fire
        const fh=8+Math.sin(G.gameTime*20+st.id)*2;
        for(let f=0;f<fh;f++){
          const a=Math.sin(G.gameTime*22+st.id*3+f*4)>0?.8:.4;
          ctx.globalAlpha=a;
          pr(sx2+22-f*.5,sy-12-f*3,8+f,3,C.ORANGE);
          pr(sx2+26-f*.3,sy-10-f*3,4+f*.5,2,C.YELLOW);
        }
        ctx.globalAlpha=1;

        // Progress bar
        const pct=Math.min(1,st.progress/st.maxProgress);
        b(sx2+6,sy-22,st.w-12,7,C.DBRN,C.BLACK,2);
        const bc=pct>0.85?C.YELLOW:pct>0.6?C.ORANGE:C.RED;
        r(sx2+8,sy-20,(st.w-16)*pct,5,bc);

        // Indicator
        if(pct>0.85&&pct<1.15)txt('✨',sx2+st.w-12,sy-14,C.YELLOW,10);
        else if(pct>=1.15)txt('💀',sx2+st.w-12,sy-14,C.RED,10);
      }else{
        // Idle
        const hasOrders=orderQueue.some(o=>!o.assigned);
        if(hasOrders){
          // Pulsing glow to attract player
          const gp=0.2+Math.sin(G.gameTime*4+st.id)*0.15;
          ctx.globalAlpha=gp;
          r(sx2-2,sy-2,st.w+4,st.h+4,C.ORANGE);
          ctx.globalAlpha=1;
          txt('🔥 点击烹饪',sx2+4,sy+st.h-10,C.YELLOW,11);
        }else{
          pr(sx2+22,sy-6,4,4,C.DRED);
          txt('空闲',sx2+18,sy+st.h-8,C.GRAY,9);
        }
      }
    }
  });

  // Cash register
  const crx=MAP.STREET_END-cx+10;
  if(crx>-40&&crx<W){
    r(crx,50,28,22,C.GOLD);
    r(crx+4,46,20,12,C.YELLOW);
    txt('¥',crx+10,56,C.DBRN,12);
  }
}

function drawAllEntities(cx){
  const sorted=[...entities].filter(e=>e.state!=='left').sort((a,b)=>a.y-b.y);

  sorted.forEach(e=>{
    const ex=e.x-cx,ey=e.y;
    if(ex<-50||ex>W+30)return;

    const charH=12*PU;
    const ch=8;

    if(e.type==='customer'||e.type==='pedestrian'){
      // Look up sprite
      const key=e.type==='pedestrian'?'ped':'c'+(e.variant%8);
      const spr=CHAR_SPRITES[key];
      if(!spr)return;
      const scale=1.25; // bigger, more readable characters
      const pw=ch*PU*scale; // pixel width of character
      const ph=12*PU*scale;

      if(e.state==='seated'||e.state==='done'){
        // Sitting: draw upper body only (rows 0-6)
        const base=spr[0];
        const seatY=ey-ph+12;
        for(let r2=0;r2<6;r2++)
          for(let c2=0;c2<ch;c2++){
            const col=base[r2]?.[c2];
            if(col)ctx.fillRect((ex+c2*PU*scale)|0,(seatY+r2*PU*scale)|0,PU*scale,PU*scale);
          }

        // Pulsing "click me" indicator for seated (not yet ordered)
        if(e.state==='seated'&&!e.order){
          const pulse=0.3+Math.sin(G.gameTime*3)*0.15;
          ctx.globalAlpha=pulse;
          ctx.strokeStyle=C.YELLOW;
          ctx.lineWidth=2;
          ctx.beginPath();
          ctx.arc(ex+pw/2,seatY-4,pw/2+6,0,Math.PI*2);
          ctx.stroke();
          ctx.globalAlpha=1;
        }

        // If done show blinking 💰
        if(e.state==='done'){
          const blink=Math.sin(G.gameTime*4)>0;
          if(blink)txt('💰 结账',ex+pw/2-20,seatY-10,C.GOLD,14);
        }
      }else if(e.state==='walking'||e.state==='walking_out'){
        // Walking: draw full body with bobbing
        const f=spr[e.frame];
        const bobY=Math.floor(e._bob||0);
        dr(f,ex,ey-ph+bobY,scale);

        // Pulsing dot above walking customers
        if(e.type==='customer'){
          ctx.globalAlpha=0.4+Math.sin(G.gameTime*5)*0.2;
          r(ex+pw/2-2,ey-ph-12+bobY,4,4,C.YELLOW);
          ctx.globalAlpha=1;
        }
      }

      // Patience bar (standing/walking customers)
      if(e.state==='walking'||e.state==='walking_out'){
        const pct=e.patience/35;
        const pc=pct>0.5?C.GREEN:pct>0.25?C.YELLOW:C.RED;
        const barW=pw-4;
        r(ex+2,ey-ph-10,barW,4,C.BLACK);
        r(ex+3,ey-ph-9,(barW-2)*Math.min(1,pct),3,pc);
      }

      // Shadow
      ctx.globalAlpha=.2;
      pr(ex+4,ey-2,pw-8,4,C.BLACK);
      ctx.globalAlpha=1;

    }else if(e.type==='food_fx'){
      // Flying food visual
      const prog=1-Math.max(0,Math.min(1,(e._age||0)/(e.lifespan||0.5)));
      const fx=e.x+(e.targetX-e.x)*(1-prog)-cx;
      const fy=e.y+(e.targetY-e.y)*(1-prog);
      dr(S_PLATE,fx-8,fy-6,0.6);
    }
  });
}

function drawHUD(cx){
  // Top bar
  r(0,0,W,30,'rgba(0,0,0,.7)');

  // Gold
  dr(S_COIN,4,3,0.7);
  txt(` ${G.gold}`,22,16,C.YELLOW,13);

  // Level
  txt(`Lv.${G.level}`,90,16,C.CREAM,13);

  // Customer count
  const cnt=entities.filter(e=>e.type==='customer'&&e.state!=='left').length;
  txt(`👥 ${cnt}`,150,16,C.WHITE,12);

  // Served
  txt(`☑ ${G.served}`,210,16,C.LGRAY,12);

  // Order queue
  if(orderQueue.length>0)txt(`📋 ${orderQueue.length}`,270,16,C.ORANGE,12);

  // Scroll indicator + pulsing arrow
  if(CAM.maxX>0){
    const pct=cx/CAM.maxX;
    r(W/2-30,672,60,4,'rgba(255,255,255,.15)');
    r(W/2-30+pct*50,672,10,4,'rgba(255,255,255,.4)');
    // Pulsing right arrow when stoves not fully visible
    if(cx<CAM.maxX-20){
      const ap=0.3+Math.sin(G.gameTime*3)*0.2;
      ctx.globalAlpha=ap;
      txt('▶',W-22,340,C.YELLOW,24);
      txt('拖动 ← 厨房',W-90,315,C.LGRAY,12);
      ctx.globalAlpha=1;
    }
  }

  // Day/night tint
  const night=Math.floor(G.gameTime/90)%2===1;
  if(night){ctx.globalAlpha=.15;r(0,0,W,H,C.BLUE);ctx.globalAlpha=1;}
}

function drawOrderMenu(){
  // Semi-transparent overlay
  r(0,0,W,H,'rgba(0,0,0,.6)');

  const mx=80,my=250,mw=260,mh=320;
  b(mx,my,mw,mh,C.GOLD,C.DBRN);
  txt('📋 请选择菜品',mx+20,my+24,C.YELLOW,16);

  // Close button
  b(mx+mw-40,my+8,32,22,C.RED,C.DRED);
  txt('✕',mx+mw-32,my+24,C.WHITE,14);

  // Menu items
  const iy=my+40,iH=32;
  menuState.items.forEach((item,i)=>{
    const y=iy+i*(iH+6);
    const canAfford=true; // No cost for ordering
    b(mx+10,y,mw-20,iH,canAfford?C.GREEN:C.GRAY,canAfford?'#2a4a2a':'#333');
    txt(`${item.name}  ¥${item.price}`,mx+20,y+iH-8,canAfford?C.WHITE:C.GRAY,12);
    txt(`⏱${item.cookTime}s`,mx+mw-70,y+iH-8,C.LGRAY,10);
  });
}

// ============================================================
//  INPUT BINDING
// ============================================================
const canvas=document.getElementById('c');

canvas.addEventListener('mousedown',e=>{
  const p=getWorldPos(e);
  // Always check click first
  handleClick(p.x,p.y);
  // Then start drag
  isDrag=true;dxS=e.clientX;camS=CAM.x;
});

canvas.addEventListener('mousemove',e=>{
  if(isDrag){
    const r2=canvas.getBoundingClientRect();
    CAM.x=Math.max(0,Math.min(CAM.maxX,camS+(dxS-e.clientX)*W/r2.width));
  }
});

canvas.addEventListener('mouseup',()=>{isDrag=false});
canvas.addEventListener('mouseleave',()=>{isDrag=false});

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0],r2=canvas.getBoundingClientRect();
  const mx=(t.clientX-r2.left)*W/r2.width;
  const my=(t.clientY-r2.top)*H/r2.height;
  handleClick(mx,my);
  isDrag=true;dxS=t.clientX;camS=CAM.x;
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(isDrag&&e.touches.length>0){
    const t=e.touches[0],r2=canvas.getBoundingClientRect();
    CAM.x=Math.max(0,Math.min(CAM.maxX,camS+(dxS-t.clientX)*W/r2.width));
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{e.preventDefault();isDrag=false},{passive:false});

// ============================================================
//  TOOLTIP
// ============================================================
let tipTimer=null;
function setTip(msg){
  document.getElementById('tooltip').textContent=msg;
  if(tipTimer)clearTimeout(tipTimer);
  tipTimer=setTimeout(()=>{
    document.getElementById('tooltip').textContent='👆 顾客到了就点击他 → 选菜 → 去右边厨房烹饪';
    tipTimer=null;
  },3000);
}

// ============================================================
//  GAME LOOP
// ============================================================
let last=0;
function loop(time){
  const dt=Math.min(.1,(time-last)/1000);
  last=time;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ============================================================
//  START
// ============================================================
setTip('🔥 火锅店开张！顾客正走来...');
requestAnimationFrame(loop);
</script>
