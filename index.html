<!DOCTYPE html>

<head>

<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-touch-callout:none}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Courier New',monospace;overflow:hidden}
#c{position:relative;width:420px;height:700px;background:#3a2010;border:4px solid #5c3a1e;border-radius:8px;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.5)}
canvas{display:block;width:100%;height:100%;touch-action:none}
#tip{position:absolute;bottom:10px;left:10px;right:10px;background:rgba(0,0,0,.85);color:#ffcc00;padding:8px 12px;border-radius:4px;font-size:13px;text-align:center;pointer-events:none}

<body>
<div id="c">
  <canvas id="g" width="420" height="700"></canvas>
  <div id="tip">🔥 老火锅开张！</div>
</div>
<script>
// ============================================================
// CONFIG
// ============================================================
const PU=4,W=420,H=700,SH=175; // strip height
const WW=720; // world width

const CAM={x:120,maxX:WW-W};
const DOOR={x:360,y:472,w:36,h:38}; // center of world, bottom of restaurant

const STRIP={top:0,mid:SH,bot:SH*2,road:SH*3}; // y-start of each strip

// Tables (world coords: cx=center x, y=top y)
const TABLES=[
  {id:1,cx:120, y:STRIP.top+70,  w:74,h:54, state:'clean',cust:null,max:2,label:'2人桌'},
  {id:2,cx:280, y:STRIP.top+70,  w:74,h:54, state:'clean',cust:null,max:2,label:'2人桌'},
  {id:3,cx:480, y:STRIP.top+70,  w:74,h:54, state:'clean',cust:null,max:4,label:'4人桌'},
  {id:4,cx:170, y:STRIP.mid+85,  w:74,h:54, state:'clean',cust:null,max:2,label:'2人桌'},
  {id:5,cx:340, y:STRIP.mid+85,  w:74,h:54, state:'clean',cust:null,max:4,label:'4人桌'},
  {id:6,cx:540, y:STRIP.mid+85,  w:74,h:54, state:'clean',cust:null,max:2,label:'2人桌'},
];
const STOVES=[
  {id:1,x:460, y:STRIP.bot+30, w:64,h:48, busy:false,progress:0,maxP:5,orderId:null,_tasked:false},
  {id:2,x:560, y:STRIP.bot+30, w:64,h:48, busy:false,progress:0,maxP:5,orderId:null,_tasked:false},
  {id:3,x:660, y:STRIP.bot+30, w:64,h:48, busy:false,progress:0,maxP:5,orderId:null,_tasked:false},
];

// ============================================================
// PALETTE
// ============================================================
const C={
  RED:'#cc3333',DRED:'#881111',ORANGE:'#ff6633',YELLOW:'#ffcc00',
  GOLD:'#daa520',BROWN:'#8b4513',DBRN:'#5c2e00',
  GREEN:'#339933',DGREEN:'#226622',
  WHITE:'#fff',CREAM:'#fff8e7',LGRAY:'#ddd',GRAY:'#888',DGRAY:'#444',BLACK:'#222',
  BLUE:'#3366cc',PURPLE:'#9966cc',TEAL:'#339999',SKIN:'#ffcc99',SKIN2:'#eebb88',SKIN3:'#ddaa77',PINK:'#ff99aa',
  BRICK:'#aa5533',DBRICK:'#884422',
  SWALK:'#c8c0b0',ROAD:'#555',RLINE:'#ffdd55',
  WALL:'#ffe8cc',DWALL:'#ddbb99',FLOOR:'#d4c4a8',DFLOOR:'#c4b498',WOOD:'#996644',
};
const _=0;

// ============================================================
// RENDERER
// ============================================================
const cx=document.getElementById('g').getContext('2d');
const r=(x,y,w,h,c2)=>{cx.fillStyle=c2;cx.fillRect(x,y,w,h)};
const pr=(x,y,w,h,c2)=>{cx.fillStyle=c2||cx.fillStyle;const p=PU;cx.fillRect(Math.floor(x/p)*p,Math.floor(y/p)*p,Math.floor(w/p)*p,Math.floor(h/p)*p)};
const bx=(x,y,w,h,bc,fc,s)=>{s=s||PU;pr(x,y,w,s,bc);pr(x,y+h-s,w,s,bc);pr(x,y,s,h,bc);pr(x+w-s,y,s,h,bc);if(fc)pr(x+s,y+s,w-s*2,h-s*2,fc)};
const tx=(t,x,y,c2,sz)=>{cx.fillStyle=c2||C.WHITE;cx.font=`bold ${sz||12}px 'Courier New',monospace`;cx.textAlign='left';cx.fillText(t,x|0,y|0)};

const dr=(d,x,y,sc)=>{
  const s=(sc||1)*PU;
  for(let r2=0;r2<d.length;r2++)
    for(let c2=0;c2<d[r2].length;c2++){
      const col=d[r2][c2];
      if(col)cx.fillRect((x+c2*s)|0,(y+r2*s)|0,(s+0.5)|0,(s+0.5)|0);
    }
};

// ============================================================
// CHARACTERS
// ============================================================
function mkChar(hair,skin,shirt,pants,shoes){
  const H=hair,S=skin,T=shirt,P=pants,F=shoes,W=C.WHITE,B=C.BLACK,R=C.RED;
  const base=[];
  base[0]=[_,_,H,H,H,H,_,_];       // hair top
  base[1]=[_,H,H,H,H,H,H,_];       // hair
  base[2]=[_,H,S,S,S,S,H,_];       // face + hair sides
  base[3]=[_,S,W,W,W,W,S,_];       // big eyes (4px white)
  base[4]=[_,S,S,B,B,S,S,_];       // pupils (2px black)
  base[5]=[_,S,S,S,R,S,S,_];       // mouth (1px red)
  base[6]=[_,S,S,S,S,S,S,_];       // chin
  base[7]=[_,S,T,T,T,T,S,_];       // collar
  base[8]=[_,T,T,T,T,T,T,_];       // shirt
  base[9]=[T,T,_,_,_,_,T,T];       // arms
  base[10]=[_,P,P,P,P,P,P,_];      // pants
  base[11]=[_,_,F,F,F,F,_,_];      // shoes
  const walk=base.map(r=>[...r]);
  walk[10]=[_,P,_,_,_,P,_,_];      // legs striding
  walk[11]=[_,_,F,F,_,F,F,_];      // feet apart
  return[base,walk];
}
const CS={};
CS.ped=mkChar(C.DGRAY,C.SKIN2,C.GRAY,C.DGRAY,C.BLACK);

// ============================================================
// SPRITES
// ============================================================
const SHP=[
  [0,0,C.LGRAY,C.LGRAY,C.LGRAY,C.LGRAY,0,0],
  [0,C.LGRAY,C.DRED,C.RED,C.RED,C.DRED,C.LGRAY,0],
  [0,C.DGRAY,C.RED,C.ORANGE,C.ORANGE,C.RED,C.DGRAY,0],
  [0,C.DGRAY,C.RED,C.YELLOW,C.YELLOW,C.RED,C.DGRAY,0],
  [0,C.DGRAY,C.RED,C.ORANGE,C.ORANGE,C.RED,C.DGRAY,0],
  [0,C.LGRAY,C.DRED,C.RED,C.RED,C.DRED,C.LGRAY,0],
  [0,0,C.BROWN,C.BROWN,C.BROWN,C.BROWN,0,0],
  [0,0,0,C.DBRN,C.DBRN,0,0,0],
];
const SPL=[
  [0,0,C.WHITE,C.WHITE,0,0],[0,C.WHITE,C.LGRAY,C.LGRAY,C.WHITE,0],
  [C.WHITE,C.LGRAY,C.RED,C.RED,C.LGRAY,C.WHITE],
  [C.WHITE,C.LGRAY,C.GREEN,C.GREEN,C.LGRAY,C.WHITE],
  [0,C.WHITE,C.LGRAY,C.LGRAY,C.WHITE,0],[0,0,C.WHITE,C.WHITE,0,0],
];
const SCO=[
  [0,C.GOLD,C.GOLD,C.GOLD,C.GOLD,0],[C.GOLD,C.YELLOW,C.YELLOW,C.YELLOW,C.YELLOW,C.GOLD],
  [C.GOLD,C.YELLOW,C.WHITE,C.WHITE,C.YELLOW,C.GOLD],
  [C.GOLD,C.YELLOW,C.WHITE,C.WHITE,C.YELLOW,C.GOLD],
  [C.GOLD,C.YELLOW,C.YELLOW,C.YELLOW,C.YELLOW,C.GOLD],[0,C.GOLD,C.GOLD,C.GOLD,C.GOLD,0],
];

// ============================================================
// STATE
// ============================================================
const G={gold:300,diamond:0,level:1,exp:0,served:0,earned:0,gt:0,_ct:0,
  _epmTimer:0,_epmStart:0,_epmRate:0};
let E=[],orderQ=[],oid=0;

// ============================================================
// ENTITY SYSTEM
// ============================================================
const ENT={
  create(t,x,y,c){
    return Object.assign({
      type:t,x,y,tx:x,ty:y,wp:[],wpi:0,spd:50+Math.random()*20,
      dir:1,f:0,ft:0,va:0,st:'idle',tid:null,
      order:null,ep:0,sat:100,pat:35,
    },c||{});
  },
  upd(e,dt){
    switch(e.st){
      case'idle':break;
      case'walk':case'wout':this._mv(e,dt,e.tx,e.ty);break;
      case'to_door':
        this._mv(e,dt,e.tx,e.ty);
        // Check if at door (close enough in x AND above door y)
        if(Math.abs(e.x-DOOR.x)<6&&e.y<=DOOR.y+DOOR.h-8){
          e.wpi++;if(e.wpi<e.wp.length){e.tx=e.wp[e.wpi].x;e.ty=e.wp[e.wpi].y;}
          else{e.st='walk';e.tx=e.wp[e.wp.length-1].x;e.ty=e.wp[e.wp.length-1].y;}
        }
        break;
      case'seat':
        // 耐心值消耗：未点单消耗快(×1.0)，已点单消耗慢(×0.4)
        if(e.pat>0){
          const rate=e.order?0.4:1.0;
          e.pat-=dt*rate;
          if(e.pat<=0){
            e.st='angry';e._angryTimer=0;
            if(e.order)orderQ=orderQ.filter(x=>x.id!==e.order.id);
            const tb=TABLES.find(t=>t.id===e.tid);
            if(tb){tb.state='dirty';tb.cust=null;e.tid=null;
              addTask('clean',tb.id,tb.cx,tb.y+tb.h/2);}
            tip('😤 顾客等不及走了！');
          }
        }
        break;
      case'eat':
        e.ep+=dt/6;if(e.ep>=1){e.st='done';
          addTask('checkout',e.id,e.x,e.y-10);
        if(!STAFF.some(s=>s.role==='qian'))tip('💰 点击顾客结账');}
        break;
      case'done':break;
      case'angry':
        e._angryTimer=(e._angryTimer||0)+dt;
        if(e._angryTimer>2){
          e.st='wout';
          e.wp=[{x:DOOR.x,y:DOOR.y+DOOR.h-4},{x:DOOR.x,y:ROAD_Y},
            {x:e.x<DOOR.x?CAM.x-30:CAM.x+W+30,y:ROAD_Y}];
          e.wpi=0;e.tx=e.wp[0].x;e.ty=e.wp[0].y;e.dir=e.tx>e.x?1:-1;
        }
        break;
      case'flying':
        e._a=(e._a||0)+dt;if(e._a>=e.life)e.st='left';break;
      case'left':break;
      // 员工状态
      case'staff_idle':{
        const t2=TASKS.find(t=>!t.assigned&&e.canDo(t.type));
        if(t2){
          t2.assigned=true;t2.staff=e;e.task=t2;e.st='staff_walk';
          e.tx=t2.x;e.ty=t2.y;
        }
        break;
      }
      case'staff_walk':{
        const dx=e.tx-e.x,dy=e.ty-e.y,dist=Math.sqrt(dx*dx+dy*dy);
        if(isNaN(dist)||!isFinite(dist)){e.st='staff_idle';break;}
        if(dist<4){
          e.st='staff_work';e._workTimer=0;
        }else{
          const mgrBonus=STAFF.some(s=>s.role==='yuge')?1.2:1;
          const s=e.spd*mgrBonus*dt;e.x+=dx/dist*s;e.y+=dy/dist*s;
          e.dir=dx>0?1:-1;e.ft+=dt;
          if(e.ft>0.2){e.f=1-e.f;e.ft=0;}
        }
        break;
      }
      case'staff_work':{
        e._workTimer=(e._workTimer||0)+dt;
        const dur=e.task?e.taskDur[e.task.type]||3:3;
        if(e._workTimer>=dur){
          doStaffTask(e);
          // 摸鱼判定：完成3个任务后有15%概率进入摸鱼
          e._taskCount=(e._taskCount||0)+1;
          if(e._taskCount>=3&&Math.random()<0.15){
            e.st='slacking';e._slackTimer=5+Math.random()*3;e._taskCount=0;e.task=null;
          }else{
            e.st='staff_idle';e.task=null;
          }
        }
        break;
      }
      case'slacking':{
        e._slackTimer=(e._slackTimer||0)-dt;
        if(e._slackTimer<=0){e.st='staff_idle';e._slackTimer=0;e._taskCount=0;}
        break;
      }
    }
  },
  _mv(e,dt,tx,ty){
    const dx=tx-e.x,dy=ty-e.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(isNaN(dist)||!isFinite(dist)){e.st='left';return;}
    if(dist<4){
      e.wpi++;
      if(e.wpi>=e.wp.length){
        if(e.type==='cust'){
          if(e.st==='walk'){e.st='seat';tip('👤 顾客入座了！点击接单');
            addTask('order',e.id,e.x,e.y);}
          else if(e.st==='wout'){e.st='left';
            const tb=TABLES.find(t=>t.id===e.tid);
            if(tb){tb.state='dirty';tb.cust=null;
              addTask('clean',tb.id,tb.cx,tb.y+tb.h/2);}
          }
        }else e.st='left';
      }else{e.tx=e.wp[e.wpi].x;e.ty=e.wp[e.wpi].y;e.dir=e.tx>e.x?1:-1;}
    }else{
      const s=e.spd*dt;e.x+=dx/dist*s;e.y+=dy/dist*s;
      e.dir=dx>0?1:-1;e.ft+=dt;
      if(e.ft>0.2){e.f=1-e.f;e.ft=0;}
    }
  },
};

// ============================================================
// TASK QUEUE + STAFF SYSTEM
// ============================================================
const TASKS=[];
let taskId=0;
const TPRIO={checkout:0,serve:1,clean:2,order:3}; // 数值越低越紧急

function addTask(type,targetId,x,y){
  if(TASKS.some(t=>t.type===type&&t.tid===targetId))return null;
  const t={id:++taskId,type,tid:targetId,x,y,prio:TPRIO[type]||9,assigned:false,staff:null};
  TASKS.push(t);
  TASKS.sort((a,b)=>a.prio-b.prio);
  return t;
}
function removeTask(fn){
  for(let i=TASKS.length-1;i>=0;i--){
    if(fn(TASKS[i])){
      if(TASKS[i].staff){TASKS[i].staff.task=null;TASKS[i].staff.st='staff_idle';}
      TASKS.splice(i,1);
    }
  }
}

// 员工角色定义
const SROLES={
  wang:{
    label:'👨‍🍳小王',cost:100,spd:55,
    canDo:t=>t.type==='order'||t.type==='serve'||t.type==='clean',
    taskDur:{order:0.3,serve:0.8,clean:3},
    chars:[C.WHITE,C.SKIN2,C.BLUE,C.DGRAY,C.BLACK],
  },
  qian:{
    label:'💼钱女士',cost:150,spd:45,
    canDo:t=>t.type==='checkout',
    taskDur:{checkout:0.5},
    chars:[C.BLACK,C.SKIN,C.GREEN,C.DGRAY,C.BLACK],
  },
  luo:{
    label:'🧹罗阿姨',cost:80,spd:40,
    canDo:t=>t.type==='clean',
    taskDur:{clean:2.5},
    chars:[C.DGRAY,C.SKIN3,C.BROWN,C.DGRAY,C.BLACK],
  },
  xiao:{
    label:'👧晓晓',cost:250,spd:60,
    canDo:t=>t.type==='order'||t.type==='serve'||t.type==='clean'||t.type==='checkout',
    taskDur:{order:0.35,serve:1.0,clean:3.5,checkout:0.8},
    chars:[C.BROWN,C.SKIN2,C.PINK,C.DGRAY,C.BLACK],unlockLv:4,
  },
  xue:{
    label:'❄️雪雪',cost:280,spd:50,
    canDo:t=>t.type==='serve',
    taskDur:{serve:0.25},
    chars:[C.WHITE,C.SKIN,C.TEAL,C.BLUE,C.BLACK],unlockLv:4,
  },
  achang:{
    label:'🧹阿昌',cost:200,spd:45,
    canDo:t=>t.type==='clean',
    taskDur:{clean:1.2},
    chars:[C.BLACK,C.SKIN3,C.DGREEN,C.DGRAY,C.BLACK],unlockLv:5,
  },
  yuge:{
    label:'👔于哥',cost:600,spd:35,
    canDo:t=>true,
    taskDur:{order:0.2,serve:0.5,clean:2.0,checkout:0.3},
    chars:[C.BLACK,C.SKIN,C.PURPLE,C.GRAY,C.BLACK],unlockLv:7,
  },
};
Object.values(SROLES).forEach(r=>{r.cs=mkChar(...r.chars)});

let STAFF=[],_hireBtn=null,_upgradeBtn=null,_researchBtn=null;
let _wangHired=false,_qianHired=false,_luoHired=false,_xiaoHired=false,_xueHired=false,_achangHired=false,_yugeHired=false;

function hireStaff(role){
  const r=SROLES[role];
  if(!r||G.gold<r.cost)return false;
  G.gold-=r.cost;
  const e=ENT.create('staff',DOOR.x,DOOR.y+DOOR.h-8,{
    st:'staff_idle',spd:r.spd,role,task:null,
    canDo:r.canDo,taskDur:{...r.taskDur},
    _taskCount:0,
  });
  e.dir=1;STAFF.push(e);E.push(e);
  if(role==='wang')_wangHired=true;
  if(role==='qian')_qianHired=true;
  if(role==='luo')_luoHired=true;
  if(role==='xiao')_xiaoHired=true;
  if(role==='xue')_xueHired=true;
  if(role==='achang')_achangHired=true;
  if(role==='yuge')_yugeHired=true;
  const tips={wang:'自动接单/上菜/收拾',qian:'自动结账',luo:'专职清洁',
    xiao:'全场通才跑得快',xue:'闪电上菜',achang:'快速清洁',yuge:'全员提速20%'};
  if(tips[role])tip(`✅ ${r.label} 已入职！${tips[role]}`);
  else tip(`✅ ${r.label} 已入职！`);
  checkRankUp();
  return true;
}

function fxBurst(x,y,color,count){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,d=20+Math.random()*30;
    E.push(ENT.create('food_fx',x,y,{
      tx:x+Math.cos(a)*d,ty:y+Math.sin(a)*d-10,
      st:'flying',life:0.4+Math.random()*0.3,_a:0,_fxColor:color||C.GOLD,
    }));
  }
}

function doStaffTask(staff){
  const task=staff.task;if(!task)return;
  switch(task.type){
    case'order':{
      const cu=E.find(e=>e.id===task.tid);
      if(cu&&cu.st==='seat'&&!cu.order){
        const item=cu.want;
        const o={id:++oid,cid:cu.id,di:item.id,dn:item.n,pp:item.p,ct:item.ct,as:false,sid:null};
        orderQ.push(o);cu.order=o;
        fxBurst(cu.x,cu.y-10,C.YELLOW,4);
      }
      break;
    }
    case'serve':{
      const st=STOVES.find(s=>s.id===task.tid);
      if(st&&st.busy&&st.progress>=st.maxP)serveFood(st);
      break;
    }
    case'clean':{
      const tb=TABLES.find(t=>t.id===task.tid);
      if(tb&&tb.state==='dirty'){tb.state='clean';tb._ct=0;
        fxBurst(tb.cx,tb.y,C.GREEN,5);}
      break;
    }
    case'checkout':{
      const cu=E.find(e=>e.id===task.tid);
      if(cu&&cu.st==='done'){checkout(cu);
        fxBurst(cu.x,cu.y-10,C.GOLD,6);}
      break;
    }
  }
  removeTask(t=>t.id===task.id);
}

// ============================================================
// SPAWN + QUEUE
// ============================================================
const ROAD_Y=STRIP.road+68;
const QUEUE=[]; // {size,patience,elapsed}

function pickGroupSize(){
  // 按等级决定团队大小权重: [1人,2人,3人,4人]
  const tier=G.level<=3?0:G.level<=6?1:G.level<=9?2:3;
  const w=[[40,35,15,10],[30,30,25,15],[20,25,30,25],[15,20,30,35]][tier]||[40,35,15,10];
  const total=w.reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(let i=0;i<4;i++){r-=w[i];if(r<=0)return i+1;}
  return 1;
}

function trySeatGroup(size){
  // 找能容纳的干净桌子（最小优先）
  let best=null;
  for(const t of TABLES){
    if(t.state==='clean'&&t.max>=size){
      if(!best||t.max<best.max)best=t;
    }
  }
  if(!best)return null;
  // spawn single group leader entity
  const fromLeft=Math.random()>0.5;
  const sx=fromLeft?CAM.x-30:CAM.x+W+30;
  const availItems=MITEMS.filter(it=>!it.need||G._researched.includes(it.need));
  const item=availItems[Math.floor(Math.random()*availItems.length)];
  const type=pickCustType();
  const e=ENT.create('cust',sx,ROAD_Y,{
    st:'walk',tid:best.id,spd:(40+Math.random()*15)*type.spdMod,
    pat:type.patBase+Math.random()*8-4,sat:100,want:item,custType:type,
    groupSize:size,
  });
  e.maxPat=e.pat;
  const tcx=best.cx;

}

// 三评分：初始化为0
G.foodRating=0;G.servRating=0;G.facRating=0;

function calcRatings(){
  // 美食评分 = 已服务顾客数 + 菜品收入累计/50
  G.foodRating=Math.floor(G.served*1.0+G.earned*0.02);
  // 服务评分 = 员工数×15 + 已服务顾客×0.5 + 摸鱼唤醒次数（好感）
  G.servRating=Math.floor(STAFF.length*15+G.served*0.5);
  // 设施评分 = 总收入/50 + 当前金币/20
  G.facRating=Math.floor(G.earned*0.02+G.gold*0.05);
}

function checkRankUp(){
  calcRatings();
  const cur=RANKS[G.level-1];
  if(!cur)return;
  // 当前评分满足下一等级需求？
  const next=RANKS[G.level];
  if(!next)return;
  const n=next.need;
  if(G.foodRating>=n.food&&G.servRating>=n.serv&&G.facRating>=n.fac){
    G.level++;
    G.diamond=(G.diamond||0)+Math.floor(G.level/2);
    const nn=RANKS[G.level-1];
    tip(`🎉 升级！${nn.name} ${nn.unlock?'→ '+nn.unlock:''}`);
    // 更新生成间隔
    calcRatings();
  }
}

function checkout(cu){
  if(cu.st!=='done')return;
  const bp=cu.want?.p??50;
  const sm=cu.custType?cu.custType.spendMult:1.0;
  const sb=1+(cu.sat-50)/100;
  const grp=cu.groupSize||1;
  const inc=Math.max(1,Math.floor(bp*sm*sb*(G._priceMult||1)*grp));
  G.gold+=inc;G.earned+=inc;G.served++;G.exp+=Math.floor(inc*0.1);
  checkRankUp();
  // 清理可能存在的结账任务（防止钱女士重复走过来）
  removeTask(t=>t.type==='checkout'&&t.tid===cu.id);
  cu.st='wout';cu.wp=[{x:DOOR.x,y:DOOR.y+DOOR.h-4},{x:DOOR.x,y:ROAD_Y},
    {x:cu.x<DOOR.x?CAM.x-30:CAM.x+W+30,y:ROAD_Y}];
  cu.wpi=0;cu.tx=cu.wp[0].x;cu.ty=cu.wp[0].y;cu.dir=cu.tx>cu.x?1:-1;
  const typeName=cu.custType?cu.custType.label:'顾客';
  tip(`💰 ${typeName} +${inc}金币！`);
}

function hc(mx,my){
  // Check all hire buttons via list of potential positions
  const hireRoles=['wang','luo','qian','xiao','xue','achang','yuge'];
  const hireFlags={wang:_wangHired,luo:_luoHired,qian:_qianHired,
    xiao:_xiaoHired,xue:_xueHired,achang:_achangHired,yuge:_yugeHired};
  let btnIdx=0;
  for(const key of hireRoles){
    if(!hireFlags[key]){
      const role=SROLES[key];
      if(!role)continue;
      // Skip if unlock level not reached
      if((role.unlockLv||0)>G.level){btnIdx++;continue;}
      const bX=W-88,bY=32+btnIdx*24,bW=84,bH=20;
      if(mx>=bX&&mx<=bX+bW&&my>=bY&&my<=bY+bH){
        if(G.gold>=role.cost)hireStaff(key);
        else tip(`💰 需 ${role.cost} 金才能招募`);
        return;
      }
      btnIdx++;
    }
  }
  // Research button
  if(_researchBtn&&mx>=_researchBtn.x&&mx<=_researchBtn.x+_researchBtn.w
    &&my>=_researchBtn.y&&my<=_researchBtn.y+_researchBtn.h){
    if(!G._researching)startResearch();
    return;
  }
  // Stove upgrade button
  if(_upgradeBtn&&mx>=_upgradeBtn.x&&mx<=_upgradeBtn.x+_upgradeBtn.w
    &&my>=_upgradeBtn.y&&my<=_upgradeBtn.y+_upgradeBtn.h){
    const lv=G._stoveLv||0,cost=80+lv*40;
    if(G.gold>=cost&&lv<5){
      G.gold-=cost;G._stoveLv=lv+1;
      tip(`🔧 灶台升级到 Lv.${lv+1}！烹饪更快了`);
      fxBurst(560,STRIP.bot+50,C.ORANGE,6);
      _upgradeBtn=null;
    }
    return;
  }
  // Stoves — click to serve done food
  STOVES.forEach(st=>{
    const sx=st.x-CAM.x;
    if(mx>=sx&&mx<=sx+st.w&&my>=st.y&&my<=st.y+st.h){
      if(st.busy)serveFood(st);
    }
  });
  // Tables — click dirty to start cleaning
  TABLES.forEach(t=>{
    const tx=t.cx-t.w/2-CAM.x;
    if(mx>=tx&&mx<=tx+t.w&&my>=t.y&&my<=t.y+t.h){
      if(t.state==='dirty'){t.state='cleaning';t._ct=0;tip('🧹 收拾桌子中...');}
    }
  });
  // Staff — 唤醒摸鱼员工
  E.forEach(e=>{
    if(e.type!=='staff')return;
    const ex=e.x-CAM.x;
    if(Math.abs(mx-ex)<24&&Math.abs(my-(e.y-20))<28){
      if(e.st==='slacking'){
        e.st='staff_idle';e._slackTimer=0;e._taskCount=0;
        const bonus=5+Math.floor(Math.random()*10);
        G.gold+=bonus;
        tip(`💤 ${SROLES[e.role].label}被叫醒！+${bonus}金币`);
        fxBurst(e.x,e.y,C.YELLOW,4);
      }
      return;
    }
  });
  // Customers — confirm order or checkout
  E.forEach(e=>{
    if(e.type!=='cust')return;
    const ex=e.x-CAM.x;
    if(Math.abs(mx-ex)<28&&Math.abs(my-(e.y-32))<30){
      if(e.st==='seat'&&!e.order){
        const item=e.want;
        const o={id:++oid,cid:e.id,di:item.id,dn:item.n,pp:item.p,ct:item.ct,as:false,sid:null};
        orderQ.push(o);e.order=o;
        tip(`📋 ${item.n} 已接单！厨房自动做`);
      }else if(e.st==='done')checkout(e);
    }
  });
}

// ============================================================
// UPDATE
// ============================================================
let st=0,pt=0;

function upd(dt){
  G.gt+=dt;
  // 每30帧刷新一次评分
  if(G.gt%0.5<dt)calcRatings();
  // 烹饪速度升级效果：每次升级灶台maxP减少0.5
  const stoveSpeed=Math.max(2.5,4-Math.floor((G._stoveLv||0)*0.5));
  // 基于等级的生成间隔：铁级5s→金级1s
  const spawnInterval=Math.max(1,5-G.level*0.28);
  const maxCust=Math.min(8,4+Math.floor(G.level/2));
  st+=dt;if(st>spawnInterval&&E.filter(e=>e.type==='cust'&&e.st!=='left').length<maxCust
    &&TABLES.some(t=>t.state==='clean')){st=0;spawnCust();}
  // Queue: tick patience + try seat
  for(let i=QUEUE.length-1;i>=0;i--){
    const q=QUEUE[i];
    q.elapsed+=dt;
    if(q.elapsed>q.patience){
      tip(`👋 ${q.size}人顾客等不及走了`);
      QUEUE.splice(i,1);
    }
  }
  // Try seat queued groups every 2s
  G._qTimer=(G._qTimer||0)+dt;
  if(G._qTimer>2){G._qTimer=0;processQueue();}
  pt+=dt;if(pt>4&&E.filter(e=>e.type==='ped'&&e.st!=='left').length<2){pt=0;spawnPed();}
  E.forEach(e=>ENT.upd(e,dt));
  // 过滤已离开+异常实体（防止 NaN 堆积）
  E=E.filter(e=>e.st!=='left'&&isFinite(e.x)&&isFinite(e.y));
  // Auto-cook: idle stoves pick up unassigned orders automatically
  STOVES.forEach(s=>{
    if(!s.busy&&orderQ.some(o=>!o.as)){
      const o=orderQ.find(o=>!o.as);
      o.as=true;o.sid=s.id;s.busy=true;s.progress=0;
      s.maxP=Math.max(2,4+Math.random()*2-(G._stoveLv||0)*0.4);s.orderId=o.id;
    }
    if(s.busy){
      s.progress+=dt;
      // 烹饪完成 → 创建上菜任务（员工系统接管）
      if(s.progress>=s.maxP&&!s._tasked){
        s._tasked=true;
        addTask('serve',s.id,s.x+s.w/2,s.y-10);
      }
    }else{
      s._tasked=false;
    }
  });
  // Table cleaning progress + 员工系统
  TABLES.forEach(t=>{
    if(t.state==='cleaning'){t._ct=(t._ct||0)+dt;if(t._ct>3){t.state='clean';t._ct=0;}}
  });
  // 每分钟收益追踪
  G._epmTimer+=dt;
  if(G._epmTimer>30){
    G._epmRate=Math.floor((G.earned-G._epmStart)*2);
    G._epmStart=G.earned;
    G._epmTimer=0;
  }
  // 员工自动招募
  if(!_wangHired&&G.served>=3&&!STAFF.some(s=>s.role==='wang')
    &&G.gold>=SROLES.wang.cost){
    hireStaff('wang');
  }
  if(!_qianHired&&G.served>=8&&!STAFF.some(s=>s.role==='qian')
    &&G.gold>=SROLES.qian.cost){
    hireStaff('qian');
  }
  if(!_luoHired&&G.served>=5&&!STAFF.some(s=>s.role==='luo')
    &&G.gold>=SROLES.luo.cost){
    hireStaff('luo');
  }
  // 菜品研发进度
  if(G._researching){
    G._researching.progress+=dt;
    if(G._researching.progress>=G._researching.maxTime){
      G._researched.push(G._researching.id);
      G._priceMult=RESEARCH.filter(r=>G._researched.includes(r.id)).reduce((a,r)=>a+(r.mult-1),1)+1;
      tip(`🎉 研发完成！${G._researching.name}（客单×${G._priceMult.toFixed(2)}）`);
      G._researching=null;
    }
  }
  // 定期存档（离线收益用）
  G._saveTimer=(G._saveTimer||0)+dt;
  if(G._saveTimer>5){
    G._saveTimer=0;
    try{localStorage.setItem('hp_last',String(Date.now()));}catch(e){}
    saveGame();
  }
}

function TXTAB(cx2,tables){
  tables.forEach(t=>{
    const tx=t.cx-t.w/2-cx2;
    if(tx>-90&&tx<W+10){
      // Shadow
      r(tx+3,t.y+3,t.w,t.h,'rgba(0,0,0,.12)');
      // Table state colors
      let bodyC,edgeC;
      if(t.state==='dirty'){bodyC='#b08050';edgeC=C.DBRN;}    // stained brown
      else if(t.state==='cleaning'){bodyC='#d09860';edgeC=C.BRICK;}
      else if(t.state==='occupied'){bodyC='#dd3333';edgeC=C.DRED;}
      else{bodyC='#ee3333';edgeC=C.RED;} // clean bright red
      // Table body with red tablecloth
      bx(tx,t.y,t.w,t.h,edgeC,bodyC,3);
      // Tablecloth decorative white edge
      for(let d=tx+6;d<tx+t.w-6;d+=12){
        pr(d,t.y+3,4,3,C.WHITE);
        pr(d,t.y+t.h-8,4,3,C.WHITE);
      }
      // 桌位容量标签
      if(t.state==='clean')tx(t.label,tx+4,t.y+t.h-16,C.GOLD,8);
      else if(t.state==='occupied'&&t.cust&&t.cust.groupSize>1)
        tx(`${t.cust.groupSize}人`,tx+4,t.y+t.h-16,C.WHITE,8);
      // 椅子（根据桌位容量）
      const chairC=t.state==='dirty'?'#886644':'#a07040';
      const chW=8,chH=12,chGap=4; // chair width/height/gap from table
      // 左侧椅子
      bx(tx-chW-chGap,t.y+8,chW,chH,C.DBRN,chairC,2);
      pr(tx-chW-chGap+2,t.y+4,4,6,chairC); // backrest
      // 右侧椅子
      bx(tx+t.w+chGap,t.y+8,chW,chH,C.DBRN,chairC,2);
      pr(tx+t.w+chGap+2,t.y+4,4,6,chairC);
      // 4人桌额外上下椅子
      if(t.max>=4){
        pr(tx+t.w/2-8,t.y-14,16,6,chairC);  //上椅面
        pr(tx+t.w/2-8,t.y-10,16,4,C.DBRN);   //上椅框
        pr(tx+t.w/2-8,t.y+t.h+6,16,6,chairC); //下椅面
        pr(tx+t.w/2-8,t.y+t.h+4,16,4,C.DBRN);
      }
      // Hotpot on table
      dr(SHP,tx+t.w/2-16,t.y+4,0.85);
      // Steam from hotpot when occupied
      if(t.state==='occupied'){
        const stm=Math.sin(G.gt*3+t.id*2)*0.5+0.5;
        cx.globalAlpha=stm*0.12;
        r(tx+t.w/2-10,t.y-10,20,6,C.WHITE);
        cx.globalAlpha=1;
      }
      // Pulsing light for unhandled customers
      if(t.state==='occupied'&&t.cust&&!t.cust.order){
        const sy=t.y-2-(G.gt*2%10);
        cx.globalAlpha=0.12;pr(tx+t.w/2-4,sy,8,4,C.WHITE);cx.globalAlpha=1;
      }
      // Dirty table indicators
      if(t.state==='dirty'){
        // stain spots
        pr(tx+12,t.y+12,8,6,'#886644');
        pr(tx+40,t.y+20,6,4,'#886644');
        const hasCleaner=STAFF.some(s=>s.role==='wang'&&TASKS.some(tt=>tt.type==='clean'&&tt.tid===t.id));
        if(hasCleaner)tx('🧹 收拾中',tx+14,t.y+t.h-18,C.LGRAY,10);
        else tx('🧹 点击收拾',tx+12,t.y+t.h-18,C.WHITE,11);
      }
      // Cleaning progress
      if(t.state==='cleaning'){
        const cp=Math.min(1,(t._ct||0)/3);
        r(tx+6,t.y+t.h-10,(t.w-12)*cp,4,C.GREEN);
        tx('🧹 Progress...',tx+12,t.y+t.h-20,C.LGRAY,9);
      }
    }
  });
}

  const kx=430-cx2;
  if(kx>-20&&kx<W){

    r(kx+1,STRIP.bot+2,2,4,C.DBRN);
  }
  // Kitchen label
  tx('🍳 厨房',440-cx2,STRIP.bot+8,C.DGRAY,11);
  const slv=G._stoveLv||0;
  if(slv>0){
    const fl=Math.sin(G.gt*3)>0;
    if(fl)tx(`Lv.${slv}`,580-cx2,STRIP.bot+22,C.ORANGE,10);
  }

  // Counter surface
  const ctrX=450-cx2,ctrY=STRIP.bot+2;
  if(ctrX>-20&&ctrX<W){
    r(ctrX+10,ctrY,250,4,C.CREAM);

      // Stove body
      bx(sx,st.y,st.w,st.h,C.DGRAY,C.BLACK,3);
      // Stove top rim
      pr(sx+2,st.y,st.w-4,3,C.GRAY);
      // Burner grate
      pr(sx+10,st.y+2,st.w-20,2,C.DGRAY);
      // Pot/Wok on stove
      if(st.busy){
        const p=Math.min(1,st.progress/st.maxP);
        const done=p>=1;
        // Pot body
        pr(sx+8,st.y-6,st.w-16,8,C.DGRAY);
        pr(sx+10,st.y-8,st.w-20,4,C.GRAY);
        // Pot handles
        pr(sx+2,st.y-2,6,3,C.DGRAY);
        pr(sx+st.w-8,st.y-2,6,3,C.DGRAY);
        // Flame effect
        if(!done){
          const fh=5+Math.sin(G.gt*18+st.id)*2;
          const slv=G._stoveLv||0;
          const fColor=slv>=4?C.TEAL:slv>=2?'#88aaff':C.ORANGE;
          for(let f=0;f<fh;f++){
            const a=Math.sin(G.gt*20+st.id*3+f*3)>0?0.8:0.3;
            cx.globalAlpha=a;
            pr(sx+22-f*.5,st.y-12-f*2,4+f*0.8,3,fColor);
          }
          cx.globalAlpha=1;
          // Steam effect
          const stm=Math.sin(G.gt*4+st.id*7)*0.5+0.5;
          cx.globalAlpha=stm*0.2;
          r(sx+18+Math.sin(G.gt*6+st.id)*6,st.y-18-Math.sin(G.gt*3+st.id)*3,10,6,C.WHITE);
          r(sx+30+Math.cos(G.gt*5+st.id)*5,st.y-16-Math.cos(G.gt*4+st.id)*2,8,4,C.WHITE);
          cx.globalAlpha=1;
          // Content inside pot
          const bubble=Math.sin(G.gt*8+st.id*5)>0;
          if(bubble){
            pr(sx+14+Math.sin(G.gt*7+st.id)*3,st.y-8,4,2,C.ORANGE);
            pr(sx+26+Math.cos(G.gt*6+st.id)*2,st.y-9,3,2,C.YELLOW);
          }
        }else{
          // Done: pot glow
          cx.globalAlpha=0.12;
          r(sx+8,st.y-2,st.w-16,st.h-4,C.YELLOW);
          cx.globalAlpha=1;
        }
        // Progress bar below pot
        bx(sx+8,st.y-22,st.w-16,6,C.DBRN,C.BLACK,2);
        const bc=done?C.YELLOW:C.ORANGE;
        r(sx+10,st.y-20,(st.w-20)*p,4,bc);
        // Status text
        if(done){
          const hasServer=STAFF.some(s=>s.role==='wang'&&TASKS.some(t=>t.type==='serve'&&t.tid===st.id));
          if(hasServer)tx('👨‍🍳 送菜中',sx+8,st.y+st.h-8,C.LGRAY,10);
          else tx('🍲 点击上菜!',sx+10,st.y+st.h-8,C.YELLOW,12);
        }else{
          tx(`⏳${Math.floor(p*100)}%`,sx+20,st.y+st.h-8,C.LGRAY,9);
        }
      }else{
        // Idle stove
        const has=orderQ.some(x=>!x.as);
        if(has){
          const gp=0.2+Math.sin(G.gt*4+st.id)*0.15;
          cx.globalAlpha=gp;r(sx-2,st.y-2,st.w+4,st.h+4,C.ORANGE);cx.globalAlpha=1;
          pr(sx+20,st.y,st.w-40,2,C.DRED);
          tx('🔥 待命',sx+18,st.y+st.h-8,C.YELLOW,10);
        }else{
          pr(sx+20,st.y,st.w-40,2,C.DGRAY);
          tx('空闲',sx+18,st.y+st.h-8,C.GRAY,9);
        }
      }
    }
  });
}

        pr(qox+4,s+24,2,4,C.DGRAY);  // legs
        // 等待条
        const q=QUEUE[i];
        if(q){
          const pct=Math.min(1,q.elapsed/q.patience);
          r(qox,s+28,12,2,'rgba(0,0,0,.3)');
          r(qox,s+28,12*(1-pct),2,C.YELLOW);
        }
      }
    }
    // "排队" 标签
    tx(`🚶排队${QUEUE.length}`,DOOR.x+DOOR.w+16-cx2,s+16,C.YELLOW,9);
  }

  // Sidewalk — 纹理更丰富
  r(0,s+30,W,30,C.SWALK);
  // Sidewalk tiles
  for(let lx=0;lx<WW;lx+=16){
    const ox=lx-cx2;
    if(ox>-16&&ox<W){
      r(ox+2,s+34,12,8,C.LGRAY);
      r(ox+2,s+46,12,8,C.LGRAY);
    }
  }
  // Sidewalk edge
  r(0,s+58,W,4,C.GRAY);

  // Road
  const rdY=s+62;
  r(0,rdY,W,SH-62,C.ROAD);
  // Road markings (dashed center line)
  for(let rl=0;rl<WW;rl+=30){
    const ox=rl-cx2;
    if(ox>-30&&ox<W)pr(ox+4,rdY+36,18,3,C.RLINE);
  }
  // Road edge lines
  r(0,rdY,W,2,C.GRAY);
  r(0,rdY+SH-64,W,2,C.GRAY);

  // 像素小汽车（参考初代宝可梦风格）
  const co=Math.floor(G.gt*30)%(WW+120)-60;
  if(co>-80&&co<WW){
    const cx3=co-cx2,cy=rdY+4;
    // Shadow
    cx.globalAlpha=0.08;
    pr(cx3,cy+28,72,4,C.BLACK);
    cx.globalAlpha=1;
    // Body (pixel-perfect)
    pr(cx3,cy+4,72,20,C.RED);
    pr(cx3,cy,72,6,C.DRED);          // body top highlight
    // Cabin/roof
    pr(cx3+12,cy-8,48,14,C.RED);
    pr(cx3+16,cy-12,40,6,C.DRED);
    // Windshield
    pr(cx3+16,cy-8,16,10,C.LGRAY);
    pr(cx3+40,cy-8,16,10,C.LGRAY);
    // Roof stripe
    pr(cx3+32,cy-8,2,10,C.DGRAY);
    // Windows
    pr(cx3+18,cy-6,12,6,C.WHITE);
    pr(cx3+42,cy-6,12,6,C.WHITE);
    // Wheel arches
    pr(cx3+4,cy+20,16,6,C.DGRAY);
    pr(cx3+52,cy+20,16,6,C.DGRAY);
    // Wheels
    pr(cx3+6,cy+22,12,8,C.BLACK);
    pr(cx3+54,cy+22,12,8,C.BLACK);
    // Hubcaps
    pr(cx3+8,cy+24,8,4,C.LGRAY);
    pr(cx3+56,cy+24,8,4,C.LGRAY);
    // Headlights
    pr(cx3+68,cy+4,4,5,C.YELLOW);
    pr(cx3+68,cy+12,4,5,C.YELLOW);
    // Tail lights
    pr(cx3,cy+4,4,5,C.ORANGE);
    pr(cx3,cy+12,4,5,C.ORANGE);
    // Bumper
    pr(cx3,cy+18,72,3,C.DGRAY);
    // Bumper detail
    pr(cx3+8,cy+19,56,1,C.GRAY);
  }
}

function drawEnts(cx2){
  const si=[...E].filter(e=>e.st!=='left').sort((a,b)=>a.y-b.y);
  si.forEach(e=>{
    const ex=e.x-cx2,ey=e.y;
    if(ex<-50||ex>W+30)return;
    const sc=1.5,ch=12*PU*sc;
    if(e.type==='cust'||e.type==='ped'){
      const sp=e.type==='ped'?CS.ped:(e.custType?e.custType.cs:CS.ped);
      if(!sp)return;
      // Sitting
      if(e.st==='seat'||e.st==='eat'||e.st==='done'||e.st==='angry'){
        const ba=sp[0],sy=ey-ch+16;
        for(let r2=0;r2<6;r2++)
          for(let c2=0;c2<8;c2++){
            const col=ba[r2]?.[c2];
            if(col)cx.fillRect((ex+c2*PU*sc)|0,(sy+r2*PU*sc)|0,PU*sc,PU*sc);
          }
        // 多人组：显示其他组员（堆叠在后面的位置）
        if(e.groupSize>1){
          const gs=sp[0]; // same sprite
          for(let g=1;g<Math.min(e.groupSize,4);g++){
            const gx=ex+g*8-6,gy=ey-ch+16+g*4;
            for(let r2=0;r2<6;r2++)
              for(let c2=0;c2<8;c2++){
                const col=gs[r2]?.[c2];
                if(col)cx.fillRect((gx+c2*PU*sc)|0,(gy+r2*PU*sc)|0,PU*sc,PU*sc);
              }
          }
        }
        if(e.st==='seat'&&!e.order&&e.want){
          tx(e.want.n,ex+2,sy-8,C.YELLOW,12);
          tx('👆 接单',ex+12,sy+16,C.WHITE,10);
        }
        if(e.st==='eat'){
          const ep=Math.min(1,e.ep);
          r(ex+4,ey-4,40*ep,3,C.ORANGE);
          tx('🍜',ex+42,ey-4,C.CREAM,10);
          // 筷子动画
          const cp=Math.sin(G.gt*10+e.id)*0.5+0.5;
          tx('🥢',ex+28+cp*4,ey-ch+38,C.WHITE,10);
          // 热汽
          if(Math.random()<0.15){
            cx.globalAlpha=0.1;
            r(ex+10+Math.random()*10,ey-ch+20+Math.random()*8,4,3,C.WHITE);
            cx.globalAlpha=1;
          }
        }
        if(e.st==='done'){
          const bl=Math.sin(G.gt*4)>0;
          if(bl){
            if(STAFF.some(s=>s.role==='qian'&&TASKS.some(t=>t.type==='checkout'&&t.tid===e.id)))
              tx('💼钱女士结账',ex+2,sy-8,C.LGRAY,10);
            else tx('💰 结账',ex+8,sy-8,C.GOLD,14);
          }
        }
        // 耐心条 + 类型标签 (坐着的顾客)
        if(e.custType&&e.maxPat>0&&(e.st==='seat'||e.st==='angry')){
          const pct=Math.max(0,Math.min(1,e.pat/e.maxPat));
          const barW=36,barY=sy-6;
          r(ex+4,barY,barW,3,'rgba(0,0,0,.5)');
          const barC=pct>0.5?C.GREEN:pct>0.25?C.GOLD:C.RED;
          if(pct>0)r(ex+4,barY,barW*pct,3,barC);
          // 类型名
          tx(e.custType.label,ex+4,barY-8,C.WHITE,8);
          // 耐心低时闪烁提示
          if(pct<0.3&&e.st==='seat'&&!e.order){
            const fl=Math.sin(G.gt*6)>0;
            if(fl)tx('⚠️',ex+30,barY-9,C.RED,12);
          }
        }
        // 愤怒状态
        if(e.st==='angry'){
          const fl=Math.sin(G.gt*8)>0;
          if(fl){tx('💢',ex+24,sy-14,C.RED,16);}
          cx.globalAlpha=0.3;pr(ex,ey-16,48,28,C.RED);cx.globalAlpha=1;
          tx('😤 等不及走了!',ex-4,sy-10,C.RED,10);
        }
      }else if(e.st==='walk'||e.st==='wout'||e.st==='to_door'){
        const f=sp[e.f],by=Math.floor(Math.sin(G.gt*10+e.id||0)*1.5);
        dr(f,ex,ey-ch+by,sc);
        // 团队人数标签
        if(e.groupSize&&e.groupSize>1)tx(`${e.groupSize}人`,ex+6,ey-ch+by-8,C.WHITE,8);
        if(CAM.x>0||e.x>CAM.x+60){
          // Pedestrian heading indicator
          cx.globalAlpha=0.3;
          tx(e.dir>0?'→':'←',ex+10,ey-ch-6,C.LGRAY,9);
          cx.globalAlpha=1;
        }
      }
      // Shadow
      cx.globalAlpha=0.15;pr(ex+6,ey-2,8*PU*sc-12,4,C.BLACK);cx.globalAlpha=1;
    }else if(e.type==='staff'){
      const role=SROLES[e.role];if(!role)return;
      const sp=role.cs,sc2=1.5,ch2=12*PU*sc2;
      if(e.st==='staff_idle'||e.st==='staff_walk'){
        const f=sp[e.f],by=Math.floor(Math.sin(G.gt*10+e.id||0)*1.5);
        dr(f,ex,ey-ch2+by,sc2);
        if(e.st==='staff_idle')tx('⏳',ex-4,ey-ch2-6,C.LGRAY,9);
      }else if(e.st==='staff_work'){
        const ba=sp[0],sy2=ey-ch2+16;
        for(let r2=0;r2<6;r2++)
          for(let c2=0;c2<8;c2++){
            const col=ba[r2]?.[c2];
            if(col)cx.fillRect((ex+c2*PU*sc2)|0,(sy2+r2*PU*sc2)|0,PU*sc2,PU*sc2);
          }
        // 工作进度条
        const pct=Math.min(1,(e._workTimer||0)/(e.task?e.taskDur[e.task.type]||3:3));
        r(ex-4,ey-6,20*pct,3,C.YELLOW);
        // 任务图标
        if(e.task){
          const icons={order:'📋',serve:'🍲',clean:'🧹',checkout:'💰'};
          tx(icons[e.task.type]||'⚙',ex,ey-18,C.WHITE,12);
        }
      }else if(e.st==='slacking'){
        // 摸鱼状态：原地站立 + ZZZ气泡
        const ba=sp[0],sy2=ey-ch2+16;
        for(let r2=0;r2<6;r2++)
          for(let c2=0;c2<8;c2++){
            const col=ba[r2]?.[c2];
            if(col)cx.fillRect((ex+c2*PU*sc2)|0,(sy2+r2*PU*sc2)|0,PU*sc2,PU*sc2);
          }
        // ZZZ闪烁
        const zz=Math.sin(G.gt*5)>0?'💤':'😴';
        tx(zz,ex+12,ey-ch2-8,C.LGRAY,14);
        // 摸鱼进度条（剩余时间）
        const rem=Math.max(0,(e._slackTimer||0)/8);
        r(ex-4,ey-6,20*rem,3,'rgba(200,200,100,.4)');
      }
      // 头顶角色标签
      tx(role.label,ex-6,ey-ch2-10,C.WHITE,9);
      // Shadow
      cx.globalAlpha=0.15;pr(ex+4,ey-2,16,4,C.BLACK);cx.globalAlpha=1;
    }else if(e.type==='food_fx'){
      const p=1-Math.max(0,Math.min(1,(e._a||0)/(e.life||0.5)));
      if(e._fxColor){
        // Burst particle
        cx.globalAlpha=p*0.8;
        r(ex-2,e.y-2,4,4,e._fxColor);
        cx.globalAlpha=1;
      }else{
        dr(SPL,e.x+(e.tx-e.x)*(1-p)-cx2-6,e.y+(e.ty-e.y)*(1-p)-4,0.6);
      }
    }
  });
}

function drawHUD(cx2){
  r(0,0,W,28,'rgba(0,0,0,.7)');
  dr(SCO,4,3,0.7);tx(` ${G.gold}`,24,16,C.YELLOW,13);
  if(G._epmRate>0)tx(`${Math.floor(G._epmRate)}/分`,56,16,C.GOLD,9);
  const rank=RANKS[G.level-1]||{name:'???'};
  tx(rank.name,90,16,C.CREAM,12);
  const cnt=E.filter(e=>e.type==='cust'&&e.st!=='left').length;
  tx(`👥 ${cnt}`,150,16,C.WHITE,12);
  tx(`☑ ${G.served}`,210,16,C.LGRAY,12);
  if(orderQ.length>0)tx(`📋 ${orderQ.length}`,270,16,C.ORANGE,12);
  if(G._priceMult>1)tx(`×${G._priceMult.toFixed(2)}`,325,16,C.TEAL,10);
  // 三评分进度（置于HUD下方背景条内）
  if(STAFF.length>0||G.served>3){
    const nextR=RANKS[G.level];
    const rV=[G.foodRating||0,G.servRating||0,G.facRating||0];
    const rN=['food','serv','fac'];
    const rL=['🍲美食','👤服务','🛋设施'];
    const rC=[C.RED,C.BLUE,C.GREEN];
    for(let i=0;i<3;i++){
      const x=2+i*36,y=30,w=32,h=5;
      r(x,y,w,h,'rgba(0,0,0,.25)');
      const max=nextR?nextR.need[rN[i]]||50:50;
      const pct=Math.min(1,rV[i]/Math.max(1,max));
      if(pct>0)r(x+1,y+1,(w-2)*pct,h-2,rC[i]);
      tx(rL[i],x,y+14,rC[i],8);
      tx(`${rV[i]}`,x+16,y+14,C.WHITE,7);
    }
    if(nextR)tx(`→${nextR.name}`,116,38,C.YELLOW,9);
  }
  // 排队人数 + 低耐心警告
  if(QUEUE.length>0)tx(`🚶${QUEUE.length}`,310,16,C.WHITE,10);
  const impat=E.filter(e=>e.type==='cust'&&e.st==='seat'&&e.pat>0&&e.pat/e.maxPat<0.3);
  if(impat.length>0){
    const fl=Math.sin(G.gt*5)>0;
    if(fl)tx(`⚠️${impat.length}`,345,16,C.RED,11);
  }
  // 招聘按钮（全部角色，按等级解锁）
  let btnIdx=0;
  const hireOrder=['wang','luo','qian','xiao','xue','achang','yuge'];
  const hiredMap={wang:_wangHired,luo:_luoHired,qian:_qianHired,
    xiao:_xiaoHired,xue:_xueHired,achang:_achangHired,yuge:_yugeHired};
  hireOrder.forEach(key=>{
    if(hiredMap[key])return;
    const role=SROLES[key];if(!role)return;
    if((role.unlockLv||0)>G.level)return; // 等级不够，不显示
    const bX=W-88,bY=32+btnIdx*24,bW=84,bH=20;
    const canHire=G.gold>=role.cost;
    r(bX,bY,bW,bH,canHire?'rgba(255,200,0,.15)':'rgba(80,80,80,.2)');
    bx(bX,bY,bW,bH,canHire?C.GOLD:C.GRAY,0,2);
    tx(canHire?role.label:'需 '+role.cost+'金',bX+6,bY+14,canHire?C.YELLOW:C.GRAY,9);
    btnIdx++;
  });
  // 厨房升级按钮
  const stoveLv=G._stoveLv||0;
  if(stoveLv<5){
    const kCost=80+stoveLv*40;
    const kX=W-88,kY=32+btnIdx*24+4,kW=84,kH=18;
    const canUp=G.gold>=kCost;
    r(kX,kY,kW,kH,canUp?'rgba(255,100,0,.15)':'rgba(80,80,80,.2)');
    bx(kX,kY,kW,kH,canUp?C.ORANGE:C.GRAY,0,2);
    tx(`🔧灶台Lv${stoveLv}`,kX+6,kY+8,C.LGRAY,8);
    tx(canUp?`${kCost}金`:`缺${kCost}`,kX+54,kY+8,canUp?C.YELLOW:C.GRAY,8);
    if(canUp)_upgradeBtn={x:kX,y:kY,w:kW,h:kH};
    btnIdx++;
  }else{
    tx('🔧灶台已满级',W-98,32+btnIdx*24+8,C.GREEN,9);
    btnIdx++;
  }
  // 研发按钮 + 进度
  const rX=W-88,rY=32+btnIdx*24+4,rW=84,rH=18;
  if(G._researching){
    const pct=Math.min(1,G._researching.progress/G._researching.maxTime);
    bx(rX,rY,rW,rH,C.DGRAY,C.BLACK,2);
    r(rX+2,rY+2,(rW-4)*pct,rH-4,C.TEAL);
    tx(`🔬${G._researching.name}`,rX+4,rY+8,C.WHITE,8);
    tx(`${Math.floor(pct*100)}%`,rX+62,rY+8,C.YELLOW,8);
    _researchBtn=null;
  }else{
    const avail=RESEARCH.filter(r=>G.level>=r.lv&&!G._researched.includes(r.id));
    if(avail.length>0){
      const cost=avail[0].cost;
      const canRes=G.gold>=cost;
      r(rX,rY,rW,rH,canRes?'rgba(0,200,200,.12)':'rgba(80,80,80,.2)');
      bx(rX,rY,rW,rH,canRes?C.TEAL:C.GRAY,0,2);
      tx('🔬研发菜品',rX+6,rY+8,canRes?C.WHITE:C.GRAY,9);
      _researchBtn={x:rX,y:rY,w:rW,h:rH};
    }else{
      tx('🔬全部研发完成',rX-4,rY+8,C.GREEN,9);
    }
  }
  // 员工状态面板（已入职的）
  STAFF.forEach((s,i)=>{
    const role=SROLES[s.role];if(!role)return;
    const sx=4,sy=30+i*14,sw=108,sh=12;
    r(sx,sy,sw,sh,'rgba(0,0,0,.4)');
    tx(role.label.substr(0,5),sx+2,sy+10,C.WHITE,9);
    const stIcons={staff_idle:'⏳',staff_walk:'🚶',staff_work:'⚙',slacking:'💤'};
    tx(stIcons[s.st]||'❓',sx+44,sy+10,C.LGRAY,9);
    // 点亮速度图标以示buff生效
    if(s.st==='staff_walk'&&_yugeHired)tx('⚡',sx+80,sy+10,C.YELLOW,9);
    if(s.task){
      const tIcons={order:'📋',serve:'🍲',clean:'🧹',checkout:'💰'};
      tx(tIcons[s.task.type]||'',sx+56,sy+10,C.YELLOW,9);
    }
  });
  if(_yugeHired)tx('👔 于哥管理 全员+20%速度',4,30+STAFF.length*14+2,C.PURPLE,8);
  // Scroll indicator
  if(CAM.maxX>0){
    const pct=cx2/CAM.maxX;
    r(W/2-30,675,60,3,'rgba(255,255,255,.12)');
    r(W/2-30+pct*50,675,10,3,'rgba(255,255,255,.35)');
    if(cx2<CAM.maxX-20){
      const ap=0.3+Math.sin(G.gt*3)*0.2;
      cx.globalAlpha=ap;tx('▶ 厨房',W-58,310,C.YELLOW,16);cx.globalAlpha=1;
    }
    if(cx2>20){
      const ap=0.2+Math.sin(G.gt*3)*0.15;
      cx.globalAlpha=ap;tx('◀',6,310,C.LGRAY,16);cx.globalAlpha=1;
    }
  }
  // Road label
  tx('═══ 马路 ═══',W/2-50,STRIP.road+SH-12,C.GRAY,9);
}


// ============================================================
// LOOP
// ============================================================
let lt=0;
function loop(t){
  try {
    const dt=Math.min(.1,(t-lt)/1000);lt=t;
    upd(dt);draw();
  } catch(e){
    // 异常保护：防止单次错误卡死整个游戏
    console.error('⚠️',e);
    try{
      // 清理异常实体（NaN坐标等）
      E=E.filter(e=>isFinite(e.x)&&isFinite(e.y));
    }catch(_){}
  }
  requestAnimationFrame(loop);
}

// ============================================================
// START
// ============================================================
loadGame();restoreStaff();
checkOffline();
if(_wangHired||_luoHired||_qianHired)tip('📂 进度已恢复！继续经营吧');
else tip('🔥 老火锅开张！接待3批客人后可招员工');
requestAnimationFrame(loop);
</script>
