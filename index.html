<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>рҹ”Ҙ зҒ«й”…еә— В· з»ҸиҗҘжЁЎжӢҹ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-touch-callout:none}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Courier New',monospace;overflow:hidden}
#c{position:relative;width:420px;height:700px;background:#3a2010;border:4px solid #5c3a1e;border-radius:8px;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.5)}
canvas{display:block;width:100%;height:100%;touch-action:none}
#tip{position:absolute;bottom:10px;left:10px;right:10px;background:rgba(0,0,0,.85);color:#ffcc00;padding:8px 12px;border-radius:4px;font-size:13px;text-align:center;pointer-events:none}
@media(max-width:440px){#c{width:100vw;height:100vh;border:none;border-radius:0}}
</style>
</head>
<body>
<div id="c">
  <canvas id="g" width="420" height="700"></canvas>
  <div id="tip">рҹ”Ҙ иҖҒзҒ«й”…ејҖеј пјҒ</div>
</div>
<script>
// ============================================================
// CONFIG
// ============================================================
const PU=4,W=420,H=700,SH=175; // strip height
const WW=720; // world width

const CAM={x:120,maxX:WW-W};
const DOOR={x:360,y:472,w:36,h:38}; // center of world, bottom of restaurant

const STRIP={top:0,mid:SH,bot:SH*2,road:SH*3}; // y-start of each strip

// Tables (world coords: cx=center x, y=top y)
const TABLES=[
  {id:1,cx:120, y:STRIP.top+70,  w:74,h:54, state:'clean',cust:null},
  {id:2,cx:280, y:STRIP.top+70,  w:74,h:54, state:'clean',cust:null},
  {id:3,cx:480, y:STRIP.top+70,  w:74,h:54, state:'clean',cust:null},
  {id:4,cx:170, y:STRIP.mid+85,  w:74,h:54, state:'clean',cust:null},
  {id:5,cx:340, y:STRIP.mid+85,  w:74,h:54, state:'clean',cust:null},
  {id:6,cx:540, y:STRIP.mid+85,  w:74,h:54, state:'clean',cust:null},
];
const STOVES=[
  {id:1,x:460, y:STRIP.bot+30, w:64,h:48, busy:false,progress:0,maxP:5,orderId:null},
  {id:2,x:560, y:STRIP.bot+30, w:64,h:48, busy:false,progress:0,maxP:5,orderId:null},
  {id:3,x:660, y:STRIP.bot+30, w:64,h:48, busy:false,progress:0,maxP:5,orderId:null},
];

// ============================================================
// PALETTE
// ============================================================
const C={
  RED:'#cc3333',DRED:'#881111',ORANGE:'#ff6633',YELLOW:'#ffcc00',
  GOLD:'#daa520',BROWN:'#8b4513',DBRN:'#5c2e00',
  GREEN:'#339933',DGREEN:'#226622',
  WHITE:'#fff',CREAM:'#fff8e7',LGRAY:'#ddd',GRAY:'#888',DGRAY:'#444',BLACK:'#222',
  BLUE:'#3366cc',PURPLE:'#9966cc',TEAL:'#339999',SKIN:'#ffcc99',SKIN2:'#eebb88',SKIN3:'#ddaa77',PINK:'#ff99aa',
  BRICK:'#aa5533',DBRICK:'#884422',
  SWALK:'#c8c0b0',ROAD:'#555',RLINE:'#ffdd55',
  WALL:'#ffe8cc',DWALL:'#ddbb99',FLOOR:'#d4c4a8',DFLOOR:'#c4b498',WOOD:'#996644',
};
const _=0;

// ============================================================
// RENDERER
// ============================================================
const cx=document.getElementById('g').getContext('2d');
const r=(x,y,w,h,c2)=>{cx.fillStyle=c2;cx.fillRect(x,y,w,h)};
const pr=(x,y,w,h,c2)=>{cx.fillStyle=c2||cx.fillStyle;const p=PU;cx.fillRect(Math.floor(x/p)*p,Math.floor(y/p)*p,Math.floor(w/p)*p,Math.floor(h/p)*p)};
const bx=(x,y,w,h,bc,fc,s)=>{s=s||PU;pr(x,y,w,s,bc);pr(x,y+h-s,w,s,bc);pr(x,y,s,h,bc);pr(x+w-s,y,s,h,bc);if(fc)pr(x+s,y+s,w-s*2,h-s*2,fc)};
const tx=(t,x,y,c2,sz)=>{cx.fillStyle=c2||C.WHITE;cx.font=`bold ${sz||12}px 'Courier New',monospace`;cx.textAlign='left';cx.fillText(t,x|0,y|0)};

const dr=(d,x,y,sc)=>{
  const s=(sc||1)*PU;
  for(let r2=0;r2<d.length;r2++)
    for(let c2=0;c2<d[r2].length;c2++){
      const col=d[r2][c2];
      if(col)cx.fillRect((x+c2*s)|0,(y+r2*s)|0,(s+0.5)|0,(s+0.5)|0);
    }
};

// ============================================================
// CHARACTERS
// ============================================================
function mkChar(hair,skin,shirt,pants,shoes){
  const H=hair,S=skin,T=shirt,P=pants,F=shoes;
  const base=[];
  base[0]=[_,_,H,H,H,H,_,_]; base[1]=[_,H,H,H,H,H,H,_];
  base[2]=[_,H,S,S,S,S,H,_]; base[3]=[_,S,S,C.BLACK,C.BLACK,S,S,_];
  base[4]=[_,S,S,_,_,S,S,_]; base[5]=[_,S,S,S,S,S,S,_];
  base[6]=[_,T,T,T,T,T,T,_]; base[7]=[_,_,T,T,T,T,_,_];
  base[8]=[_,_,P,P,P,P,_,_]; base[9]=[_,P,_,_,_,P,_,_];
  base[10]=[_,P,_,_,_,P,_,_]; base[11]=[_,_,F,F,F,F,_,_];
  const walk=base.map(r=>[...r]);
  walk[9]=[P,P,_,_,_,_,P,_]; walk[10]=[_,P,_,_,_,P,_,_]; walk[11]=[_,_,_,F,F,_,_,_];
  return[base,walk];
}
const CVAR=[
  [C.BLACK,C.SKIN,C.RED,C.DGRAY,C.BLACK],[C.BROWN,C.SKIN2,C.BLUE,C.DGRAY,C.BLACK],
  [C.GOLD,C.SKIN3,C.GREEN,C.BROWN,C.BLACK],[C.DGRAY,C.SKIN,C.ORANGE,C.DGRAY,C.BLACK],
  [C.DRED,C.SKIN2,C.PURPLE,C.BROWN,C.BLACK],[C.BLACK,C.SKIN,C.TEAL,C.DGRAY,C.BLACK],
  [C.BROWN,C.SKIN3,C.PINK,C.BROWN,C.BLACK],[C.GOLD,C.SKIN2,C.GRAY,C.DGRAY,C.BLACK],
];
const CS={};
CVAR.forEach((v,i)=>{CS['c'+i]=mkChar(...v)});
CS.ped=mkChar(C.DGRAY,C.SKIN2,C.GRAY,C.DGRAY,C.BLACK);

// ============================================================
// SPRITES
// ============================================================
const SHP=[
  [0,0,C.GRAY,C.GRAY,C.GRAY,C.GRAY,0,0],
  [0,C.GRAY,C.DRED,C.RED,C.RED,C.DRED,C.GRAY,0],
  [0,C.GRAY,C.RED,C.ORANGE,C.ORANGE,C.RED,C.GRAY,0],
  [0,C.GRAY,C.RED,C.YELLOW,C.YELLOW,C.RED,C.GRAY,0],
  [0,C.GRAY,C.RED,C.ORANGE,C.ORANGE,C.RED,C.GRAY,0],
  [0,C.GRAY,C.DRED,C.RED,C.RED,C.DRED,C.GRAY,0],
  [0,C.BROWN,C.BROWN,C.DBRN,C.DBRN,C.BROWN,C.BROWN,0],
  [0,0,C.GRAY,C.GRAY,C.GRAY,C.GRAY,0,0],
];
const SPL=[
  [0,0,C.WHITE,C.WHITE,0,0],[0,C.WHITE,C.LGRAY,C.LGRAY,C.WHITE,0],
  [C.WHITE,C.LGRAY,C.RED,C.RED,C.LGRAY,C.WHITE],
  [C.WHITE,C.LGRAY,C.GREEN,C.GREEN,C.LGRAY,C.WHITE],
  [0,C.WHITE,C.LGRAY,C.LGRAY,C.WHITE,0],[0,0,C.WHITE,C.WHITE,0,0],
];
const SCO=[
  [0,C.GOLD,C.GOLD,C.GOLD,C.GOLD,0],[C.GOLD,C.YELLOW,C.YELLOW,C.YELLOW,C.YELLOW,C.GOLD],
  [C.GOLD,C.YELLOW,C.WHITE,C.WHITE,C.YELLOW,C.GOLD],
  [C.GOLD,C.YELLOW,C.WHITE,C.WHITE,C.YELLOW,C.GOLD],
  [C.GOLD,C.YELLOW,C.YELLOW,C.YELLOW,C.YELLOW,C.GOLD],[0,C.GOLD,C.GOLD,C.GOLD,C.GOLD,0],
];

// ============================================================
// STATE
// ============================================================
const G={gold:300,level:1,exp:0,served:0,earned:0,gt:0,_ct:0};
let E=[],orderQ=[],oid=0;

// ============================================================
// ENTITY SYSTEM
// ============================================================
const ENT={
  create(t,x,y,c){
    return Object.assign({
      type:t,x,y,tx:x,ty:y,wp:[],wpi:0,spd:50+Math.random()*20,
      dir:1,f:0,ft:0,va:0,st:'idle',tid:null,
      order:null,ep:0,sat:100,pat:35,
    },c||{});
  },
  upd(e,dt){
    switch(e.st){
      case'idle':break;
      case'walk':case'wout':this._mv(e,dt,e.tx,e.ty);break;
      case'to_door':
        this._mv(e,dt,e.tx,e.ty);
        // Check if at door (close enough in x AND above door y)
        if(Math.abs(e.x-DOOR.x)<6&&e.y<=DOOR.y+DOOR.h-8){
          e.wpi++;if(e.wpi<e.wp.length){e.tx=e.wp[e.wpi].x;e.ty=e.wp[e.wpi].y;}
          else{e.st='walk';e.tx=e.wp[e.wp.length-1].x;e.ty=e.wp[e.wp.length-1].y;}
        }
        break;
      case'seat':
        break;
      case'eat':
        e.ep+=dt/6;if(e.ep>=1){e.st='done';tip('рҹ’° зӮ№еҮ»йЎҫе®ўз»“иҙҰ');}
        break;
      case'done':break;
      case'flying':
        e._a=(e._a||0)+dt;if(e._a>=e.life)e.st='left';break;
      case'left':break;
    }
  },
  _mv(e,dt,tx,ty){
    const dx=tx-e.x,dy=ty-e.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(isNaN(dist)||!isFinite(dist)){e.st='left';return;}
    if(dist<4){
      e.wpi++;
      if(e.wpi>=e.wp.length){
        if(e.type==='cust'){
          if(e.st==='walk'){e.st='seat';tip('рҹ‘Ө йЎҫе®ўе…Ҙеә§дәҶпјҒзӮ№еҮ»жҺҘеҚ•');}
          else if(e.st==='wout'){e.st='left';
            const tb=TABLES.find(t=>t.id===e.tid);
            if(tb){tb.state='dirty';tb.cust=null;}
          }
        }else e.st='left';
      }else{e.tx=e.wp[e.wpi].x;e.ty=e.wp[e.wpi].y;e.dir=e.tx>e.x?1:-1;}
    }else{
      const s=e.spd*dt;e.x+=dx/dist*s;e.y+=dy/dist*s;
      e.dir=dx>0?1:-1;e.ft+=dt;
      if(e.ft>0.2){e.f=1-e.f;e.ft=0;}
    }
  },
};

// ============================================================
// SPAWN
// ============================================================
const ROAD_Y=STRIP.road+68;

function spawnCust(){
  const fr=TABLES.find(t=>t.state==='clean');
  if(!fr)return;
  const fromLeft=Math.random()>0.5;
  const sx=fromLeft?CAM.x-30:CAM.x+W+30;
  const item=MITEMS[Math.floor(Math.random()*MITEMS.length)];
  const e=ENT.create('cust',sx,ROAD_Y,{
    st:'walk',tid:fr.id,spd:45+Math.random()*20,va:Math.floor(Math.random()*8),
    pat:30+Math.random()*10,sat:100,want:item,
  });
  // wp0: walk to door_x at road level
  // wp1: transition up through door
  // wp2: walk to table
  const tcx=fr.cx;
  e.wp=[{x:DOOR.x,y:ROAD_Y},{x:DOOR.x,y:DOOR.y+DOOR.h-4},{x:tcx,y:fr.y+fr.h-16}];
  e.wpi=0;e.tx=e.wp[0].x;e.ty=e.wp[0].y;e.dir=e.tx>e.x?1:-1;
  fr.state='occupied';fr.cust=e;E.push(e);
}

function spawnPed(){
  const l=Math.random()>0.5;
  const sx=l?CAM.x-20:CAM.x+W+20;
  const e=ENT.create('ped',sx,ROAD_Y,{
    tx:l?CAM.x+W+20:CAM.x-20,ty:ROAD_Y,
    st:'walk',spd:35+Math.random()*25,va:Math.floor(Math.random()*4),
  });
  e.dir=l?1:-1;e.wp=[{x:e.tx,y:e.ty}];e.wpi=0;E.push(e);
}

// ============================================================
// COOKING
// ============================================================
function serveFood(st){
  if(!st.busy||st.progress<st.maxP){tip('вҸі иҝҳеңЁеҒҡ...');return;}
  const o=orderQ.find(x=>x.id===st.orderId);
  if(!o){st.busy=false;return;}
  const cu=E.find(e=>e.id===o.cid);
  if(!cu||cu.st!=='seat'){
    // йЎҫе®ўе·ІдёҚеңЁеә§дҪҚ вҶ’ еҸ–ж¶ҲжӯӨи®ўеҚ•пјҢйҮҠж”ҫзҒ¶еҸ°
    orderQ=orderQ.filter(x=>x.id!==o.id);
    st.busy=false;st.progress=0;st.orderId=null;
    return;
  }
  cu.st='eat';cu.ep=0;
  st.busy=false;st.progress=0;st.orderId=null;
  orderQ=orderQ.filter(x=>x.id!==o.id);
  tip('рҹҚІ дёҠиҸңе®ҢжҲҗпјҒ');
  const fx=ENT.create('food_fx',st.x+32,st.y-14,{
    tx:cu.x,ty:cu.y-8,st:'flying',life:0.5,_a:0,
  });
  E.push(fx);
}

const MITEMS=[
  {id:1,n:'рҹҘ© иӮҘзүӣеҚ·',p:68,ct:4},{id:2,n:'рҹҰҗ иҷҫж»‘',p:88,ct:5},
  {id:3,n:'рҹҘ¬ и”¬иҸңжӢјзӣҳ',p:48,ct:3},{id:4,n:'рҹҚ„ иҸҢиҸҮжӢјзӣҳ',p:58,ct:4},
  {id:5,n:'рҹҚң жүӢе·ҘйқўжқЎ',p:38,ct:3},{id:6,n:'рҹ§Ҷ жүӢе·ҘиӮүдёё',p:78,ct:5},
];

// ============================================================
// LEVEL
// ============================================================
const LV=[0,100,150,220,320,450,600,800,1050,1350,1700];
function expN(l){return LV[l]||100+l*80}
function lvlUp(){
  const n=expN(G.level);
  if(G.exp>=n&&G.level<20){G.exp-=n;G.level++;G.diamond=Math.floor(G.level/2);tip(`рҹҺү Lv.${G.level}!`)}
}

// ============================================================
// CHECKOUT
// ============================================================
function checkout(cu){
  if(cu.st!=='done')return;
  const bp=cu.want?.p??50;
  const sb=1+(cu.sat-50)/100;
  const inc=Math.max(1,Math.floor(bp*sb));
  G.gold+=inc;G.earned+=inc;G.served++;G.exp+=Math.floor(inc*0.1);
  lvlUp();
  cu.st='wout';cu.wp=[{x:DOOR.x,y:DOOR.y+DOOR.h-4},{x:DOOR.x,y:ROAD_Y},
    {x:cu.x<DOOR.x?CAM.x-30:CAM.x+W+30,y:ROAD_Y}];
  cu.wpi=0;cu.tx=cu.wp[0].x;cu.ty=cu.wp[0].y;cu.dir=cu.tx>cu.x?1:-1;
  tip(`рҹ’° +${inc}йҮ‘еёҒпјҒ`);
}

// ============================================================
// INPUT
// ============================================================
let drag=false,ds=0,cs=0;

function wp(e){
  const r2=document.getElementById('g').getBoundingClientRect();
  return{x:(e.clientX-r2.left)*W/r2.width,y:(e.clientY-r2.top)*H/r2.height};
}

function hc(mx,my){
  // Stoves вҖ” click to serve done food
  STOVES.forEach(st=>{
    const sx=st.x-CAM.x;
    if(mx>=sx&&mx<=sx+st.w&&my>=st.y&&my<=st.y+st.h){
      if(st.busy)serveFood(st);
    }
  });
  // Tables вҖ” click dirty to start cleaning
  TABLES.forEach(t=>{
    const tx=t.cx-t.w/2-CAM.x;
    if(mx>=tx&&mx<=tx+t.w&&my>=t.y&&my<=t.y+t.h){
      if(t.state==='dirty'){t.state='cleaning';t._ct=0;tip('рҹ§№ ж”¶жӢҫжЎҢеӯҗдёӯ...');}
    }
  });
  // Customers вҖ” confirm order or checkout
  E.forEach(e=>{
    if(e.type!=='cust')return;
    const ex=e.x-CAM.x;
    if(Math.abs(mx-ex)<28&&Math.abs(my-(e.y-32))<30){
      if(e.st==='seat'&&!e.order){
        const item=e.want;
        const o={id:++oid,cid:e.id,di:item.id,dn:item.n,pp:item.p,ct:item.ct,as:false,sid:null};
        orderQ.push(o);e.order=o;
        tip(`рҹ“Ӣ ${item.n} е·ІжҺҘеҚ•пјҒеҺЁжҲҝиҮӘеҠЁеҒҡ`);
      }else if(e.st==='done')checkout(e);
    }
  });
}

// Mouse
document.getElementById('g').addEventListener('mousedown',e=>{
  const p=wp(e);hc(p.x,p.y);drag=true;ds=e.clientX;cs=CAM.x;
});
document.getElementById('g').addEventListener('mousemove',e=>{
  if(drag){CAM.x=Math.max(0,Math.min(CAM.maxX,cs+(ds-e.clientX)));}
});
document.getElementById('g').addEventListener('mouseup',()=>{drag=false});
document.getElementById('g').addEventListener('mouseleave',()=>{drag=false});
// Touch
document.getElementById('g').addEventListener('touchstart',e=>{
  e.preventDefault();const t=e.touches[0],r2=document.getElementById('g').getBoundingClientRect();
  const mx=(t.clientX-r2.left)*W/r2.width,my=(t.clientY-r2.top)*H/r2.height;
  hc(mx,my);drag=true;ds=t.clientX;cs=CAM.x;
},{passive:false});
document.getElementById('g').addEventListener('touchmove',e=>{
  e.preventDefault();
  if(drag&&e.touches.length>0){const t=e.touches[0];CAM.x=Math.max(0,Math.min(CAM.maxX,cs+(ds-t.clientX)));}
},{passive:false});
document.getElementById('g').addEventListener('touchend',e=>{e.preventDefault();drag=false},{passive:false});

// ============================================================
// TIP
// ============================================================
let tipT=null;
function tip(m){
  document.getElementById('tip').textContent=m;
  if(tipT)clearTimeout(tipT);
  tipT=setTimeout(()=>{
    document.getElementById('tip').textContent='рҹ‘Ҷ и·Ҝиҫ№жқҘе®ўдәәвҶ’иҝӣй—ЁвҶ’жҺҘеҚ•вҶ’еҺЁжҲҝиҮӘеҠЁеҒҡвҶ’дёҠиҸңвҶ’з»“иҙҰвҶ’ж”¶жӢҫ';
    tipT=null;
  },4000);
}

// ============================================================
// UPDATE
// ============================================================
let st=0,pt=0;

function upd(dt){
  G.gt+=dt;
  st+=dt;if(st>3.5&&E.filter(e=>e.type==='cust'&&e.st!=='left').length<6
    &&TABLES.some(t=>t.state==='clean')){st=0;spawnCust();}
  pt+=dt;if(pt>4&&E.filter(e=>e.type==='ped'&&e.st!=='left').length<2){pt=0;spawnPed();}
  E.forEach(e=>ENT.upd(e,dt));
  // иҝҮж»Өе·ІзҰ»ејҖ+ејӮеёёе®һдҪ“пјҲйҳІжӯў NaN е Ҷз§Ҝпјү
  E=E.filter(e=>e.st!=='left'&&isFinite(e.x)&&isFinite(e.y));
  // Auto-cook: idle stoves pick up unassigned orders automatically
  STOVES.forEach(s=>{
    if(!s.busy&&orderQ.some(o=>!o.as)){
      const o=orderQ.find(o=>!o.as);
      o.as=true;o.sid=s.id;s.busy=true;s.progress=0;
      s.maxP=4+Math.random()*2;s.orderId=o.id;
    }
    if(s.busy)s.progress+=dt;
  });
  // Table cleaning progress
  TABLES.forEach(t=>{
    if(t.state==='cleaning'){t._ct=(t._ct||0)+dt;if(t._ct>3){t.state='clean';t._ct=0;}}
  });
}

// ============================================================
// DRAW
// ============================================================
function draw(){
  const cx2=CAM.x;
  r(0,0,W,H,'#2a1808');

  // Strip 1-3: Restaurant interior
  drawStrip1(cx2); // top
  drawStrip2(cx2); // mid
  drawStrip3(cx2); // bot (kitchen + door)

  // Strip 4: Road
  drawRoad(cx2);

  // Entities
  drawEnts(cx2);

  // HUD
  drawHUD(cx2);

}

function drawStrip1(cx2){
  const s=STRIP.top,w=WW;
  // Wall pattern
  r(0,s,W,SH,C.WALL);
  for(let wx=0;wx<w;wx+=24){
    const ox=wx-cx2;if(ox>-24&&ox<W)pr(ox,s+4,12,12,C.DWALL);
  }
  // Wall trim bottom
  r(0,s+SH-6,W,6,C.WOOD);
  TXTAB(cx2,TABLES.filter(t=>t.y>=s&&t.y<s+SH));
}

function drawStrip2(cx2){
  const s=STRIP.mid,w=WW;
  // Different wall color
  r(0,s,W,SH,'#f5e8d0');
  for(let wx=0;wx<w;wx+=32){
    const ox=wx-cx2;if(ox>-32&&ox<W)pr(ox,s+30,16,8,C.DFLOOR);
  }
  r(0,s+SH-6,W,6,C.WOOD);
  TXTAB(cx2,TABLES.filter(t=>t.y>=s&&t.y<s+SH));
}

function TXTAB(cx2,tables){
  tables.forEach(t=>{
    const tx=t.cx-t.w/2-cx2;
    if(tx>-90&&tx<W+10){
      r(tx+2,t.y+2,t.w,t.h,'rgba(0,0,0,.1)');
      const tc=t.state==='dirty'?'#a08060':t.state==='cleaning'?'#c8b090':t.state==='occupied'?'#eddcc8':C.CREAM;
      bx(tx,t.y,t.w,t.h,C.WOOD,tc,3);
      dr(SHP,tx+t.w/2-16,t.y+4,0.85);
      if(t.state==='occupied'&&t.cust&&!t.cust.order){
        const sy=t.y-2-(G.gt*2%10);
        cx.globalAlpha=0.12;pr(tx+t.w/2-4,sy,8,4,C.WHITE);cx.globalAlpha=1;
      }
      if(t.state==='dirty')tx('рҹ§№ зӮ№еҮ»ж”¶жӢҫ',tx+t.w/2-24,t.y+t.h-18,C.WHITE,11);
      if(t.state==='cleaning'){
        const cp=Math.min(1,(t._ct||0)/3);
        r(tx+4,t.y+t.h-6,(t.w-8)*cp,3,C.GREEN);
        tx('рҹ§№ ж”¶жӢҫдёӯ...',tx+t.w/2-30,t.y+t.h-18,C.LGRAY,10);
      }
    }
  });
}

function drawStrip3(cx2){
  const s=STRIP.bot,y3c=STRIP.bot+STRIP.h;
  // Floor
  r(0,s,W,SH,'#e0d0b8');
  for(let fy=s;fy<y3c;fy+=16){
    const off=((fy-s)/16%2===0?0:8);
    for(let fx=0+off;fx<WW;fx+=16){
      const ox=fx-cx2;if(ox>-16&&ox<W)r(ox,fy,14,14,C.DFLOOR);
    }
  }

  // DOOR at center
  const ddx=DOOR.x-cx2;
  // Door frame
  bx(ddx-2,DOOR.y-4,DOOR.w+4,DOOR.h+8,C.DBRN,0,3);
  // Door opening (dark)
  r(ddx,DOOR.y,DOOR.w,DOOR.h,'#1a0a00');
  // Door curtain (red beads)
  for(let i=0;i<DOOR.w;i+=6)pr(ddx+i,DOOR.y+4,3,DOOR.h-8,C.DRED);
  // "иҖҒзҒ«й”…" on door
  tx('иҖҒ',ddx+10,DOOR.y+16,C.YELLOW,12);
  tx('зҒ«',ddx+10,DOOR.y+30,C.YELLOW,12);
  tx('й”…',ddx+10,DOOR.y+44,C.YELLOW,12);

  // Label above door
  tx('рҹҡӘ е…ҘеҸЈ',ddx-4,DOOR.y-14,C.CREAM,10);

  // Kitchen label
  tx('рҹҚі еҺЁжҲҝеҢә вҶ’',450-cx2,STRIP.bot+8,C.DGRAY,12);

  // Stoves
  STOVES.forEach(st=>{
    const sx=st.x-cx2;
    if(sx>-80&&sx<W+10){
      pr(sx,st.y,st.w,st.h,C.DGRAY);
      pr(sx+4,st.y+4,st.w-8,st.h-8,C.BLACK);
      pr(sx+12,st.y-4,st.w-24,5,C.GRAY);
      if(st.busy){
        const p=Math.min(1,st.progress/st.maxP);
        const done=p>=1;
        // Flame effect
        if(!done){
          const fh=5+Math.sin(G.gt*18+st.id)*2;
          for(let f=0;f<fh;f++){
            const a=Math.sin(G.gt*20+st.id*3+f*3)>0?0.7:0.3;
            cx.globalAlpha=a;
            pr(sx+20-f*.5,st.y-8-f*2,6+f,3,C.ORANGE);
          }
          cx.globalAlpha=1;
        }
        // Progress bar
        bx(sx+6,st.y-22,st.w-12,7,C.DBRN,C.BLACK,2);
        const bc=done?C.YELLOW:C.ORANGE;
        r(sx+8,st.y-20,(st.w-16)*p,5,bc);
        if(done)tx('рҹҚІ зӮ№еҮ»дёҠиҸң',sx+10,st.y+st.h-8,C.YELLOW,12);
        else tx(`вҸі${Math.floor(p*100)}%`,sx+20,st.y+st.h-8,C.LGRAY,9);
      }else{
        const has=orderQ.some(x=>!x.as);
        if(has){
          const gp=0.2+Math.sin(G.gt*4+st.id)*0.15;
          cx.globalAlpha=gp;r(sx-2,st.y-2,st.w+4,st.h+4,C.ORANGE);cx.globalAlpha=1;
          tx('рҹ”Ҙ еҫ…е‘Ҫ',sx+18,st.y+st.h-8,C.YELLOW,10);
        }else{pr(sx+22,st.y-6,4,4,C.DRED);tx('з©әй—І',sx+18,st.y+st.h-8,C.GRAY,9);}
      }
    }
  });
}

function drawRoad(cx2){
  const s=STRIP.road,rs=STRIP.road+SH;
  // Building front facade (top edge of road strip)
  r(0,s,W,30,C.BRICK);
  for(let bx=0;bx<WW;bx+=12){
    const ox=bx-cx2;if(ox>-12&&ox<W)pr(ox,s+10,6,4,C.DBRICK);
  }
  // Door bottom (continues from restaurant)
  r(DOOR.x-cx2-2,s-4,DOOR.w+4,8,C.DBRN);

  // Sidewalk
  r(0,s+30,W,32,C.SWALK);
  for(let lx=0;lx<WW;lx+=16){
    const ox=lx-cx2;if(ox>-12&&ox<W)pr(ox,s+38,8,4,C.LGRAY);
  }

  // Road
  const rdY=s+62;
  r(0,rdY,W,SH-62,C.ROAD);
  for(let rl=0;rl<WW;rl+=24){
    const ox=rl-cx2;if(ox>-20&&ox<W)pr(ox,rdY+20,14,3,C.RLINE);
  }

  // Car
  const co=Math.floor(G.gt*35)%(WW+80)-40;
  if(co>-60&&co<WW){
    const cx3=co-cx2,cy=rdY+6;
    r(cx3,cy,44,18,C.BLUE);r(cx3+6,cy-6,36,12,C.BLUE);
    pr(cx3+8,cy-10,8,8,C.LGRAY);pr(cx3+30,cy-10,8,8,C.LGRAY);
    r(cx3+6,cy+16,8,6,C.BLACK);r(cx3+30,cy+16,8,6,C.BLACK);
    r(cx3+40,cy+2,4,8,C.YELLOW);
    pr(cx3+14,cy-4,6,4,C.LGRAY);pr(cx3+26,cy-4,6,4,C.LGRAY);
  }
}

function drawEnts(cx2){
  const si=[...E].filter(e=>e.st!=='left').sort((a,b)=>a.y-b.y);
  si.forEach(e=>{
    const ex=e.x-cx2,ey=e.y;
    if(ex<-50||ex>W+30)return;
    const sc=1.25,ch=12*PU*sc;
    if(e.type==='cust'||e.type==='ped'){
      const k=e.type==='ped'?'ped':'c'+(e.va%8),sp=CS[k];
      if(!sp)return;
      // Sitting
      if(e.st==='seat'||e.st==='eat'||e.st==='done'){
        const ba=sp[0],sy=ey-ch+16;
        for(let r2=0;r2<6;r2++)
          for(let c2=0;c2<8;c2++){
            const col=ba[r2]?.[c2];
            if(col)cx.fillRect((ex+c2*PU*sc)|0,(sy+r2*PU*sc)|0,PU*sc,PU*sc);
          }
        if(e.st==='seat'&&!e.order&&e.want){
          tx(e.want.n,ex+2,sy-8,C.YELLOW,12);
          tx('рҹ‘Ҷ жҺҘеҚ•',ex+12,sy+16,C.WHITE,10);
        }
        if(e.st==='eat'){
          const ep=Math.min(1,e.ep);
          r(ex+4,ey-4,40*ep,3,C.ORANGE);
          tx('рҹҚң',ex+42,ey-4,C.CREAM,10);
        }
        if(e.st==='done'){
          const bl=Math.sin(G.gt*4)>0;
          if(bl)tx('рҹ’° з»“иҙҰ',ex+8,sy-8,C.GOLD,14);
        }
      }else if(e.st==='walk'||e.st==='wout'||e.st==='to_door'){
        const f=sp[e.f],by=Math.floor(Math.sin(G.gt*10+e.id||0)*1.5);
        dr(f,ex,ey-ch+by,sc);
        if(CAM.x>0||e.x>CAM.x+60){
          // Pedestrian heading indicator
          cx.globalAlpha=0.3;
          tx(e.dir>0?'вҶ’':'вҶҗ',ex+10,ey-ch-6,C.LGRAY,9);
          cx.globalAlpha=1;
        }
      }
      // Shadow
      cx.globalAlpha=0.15;pr(ex+6,ey-2,8*PU*sc-12,4,C.BLACK);cx.globalAlpha=1;
    }else if(e.type==='food_fx'){
      const p=1-Math.max(0,Math.min(1,(e._a||0)/(e.life||0.5)));
      dr(SPL,e.x+(e.tx-e.x)*(1-p)-cx2-6,e.y+(e.ty-e.y)*(1-p)-4,0.6);
    }
  });
}

function drawHUD(cx2){
  r(0,0,W,28,'rgba(0,0,0,.7)');
  dr(SCO,4,3,0.7);tx(` ${G.gold}`,24,16,C.YELLOW,13);
  tx(`Lv.${G.level}`,92,16,C.CREAM,13);
  const cnt=E.filter(e=>e.type==='cust'&&e.st!=='left').length;
  tx(`рҹ‘Ҙ ${cnt}`,150,16,C.WHITE,12);
  tx(`вҳ‘ ${G.served}`,210,16,C.LGRAY,12);
  if(orderQ.length>0)tx(`рҹ“Ӣ ${orderQ.length}`,270,16,C.ORANGE,12);
  // Scroll indicator
  if(CAM.maxX>0){
    const pct=cx2/CAM.maxX;
    r(W/2-30,675,60,3,'rgba(255,255,255,.12)');
    r(W/2-30+pct*50,675,10,3,'rgba(255,255,255,.35)');
    if(cx2<CAM.maxX-20){
      const ap=0.3+Math.sin(G.gt*3)*0.2;
      cx.globalAlpha=ap;tx('в–¶ еҺЁжҲҝ',W-58,310,C.YELLOW,16);cx.globalAlpha=1;
    }
    if(cx2>20){
      const ap=0.2+Math.sin(G.gt*3)*0.15;
      cx.globalAlpha=ap;tx('в—Җ',6,310,C.LGRAY,16);cx.globalAlpha=1;
    }
  }
  // Road label
  tx('в•җв•җв•җ й©¬и·Ҝ в•җв•җв•җ',W/2-50,STRIP.road+SH-12,C.GRAY,9);
}


// ============================================================
// LOOP
// ============================================================
let lt=0;
function loop(t){
  try {
    const dt=Math.min(.1,(t-lt)/1000);lt=t;
    upd(dt);draw();
  } catch(e){
    // ејӮеёёдҝқжҠӨпјҡйҳІжӯўеҚ•ж¬Ўй”ҷиҜҜеҚЎжӯ»ж•ҙдёӘжёёжҲҸ
    console.error('вҡ пёҸ',e);
    try{
      // жё…зҗҶејӮеёёе®һдҪ“пјҲNaNеқҗж Үзӯүпјү
      E=E.filter(e=>isFinite(e.x)&&isFinite(e.y));
    }catch(_){}
  }
  requestAnimationFrame(loop);
}

// ============================================================
// START
// ============================================================
tip('рҹ”Ҙ йЎҫе®ўд»¬жӯЈеңЁи·ҜдёҠиө°жқҘ...');
requestAnimationFrame(loop);
</script>
